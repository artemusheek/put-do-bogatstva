    function setCookie(name, value, days = 365) {
        const d = new Date();
        d.setTime(d.getTime() + days * 24 * 60 * 60 * 1000);
        document.cookie = name + "=" + encodeURIComponent(JSON.stringify(value)) + "; expires=" + d.toUTCString() + "; path=/";
    }

    function getCookie(name) {
        const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
        if (match) {
            try { return JSON.parse(decodeURIComponent(match[2])); } catch(e) { return null; }
        }
        return null;
    }

    // ==================== ГРАФИК ====================
    const chartCanvas = document.getElementById('priceChart');
    const ctx = chartCanvas.getContext('2d');

    function updateChart() {
        const asset = getSelectedAsset();
        if (!asset) return;
        state.chartData.push(asset.price);
        if (state.chartData.length > 60) state.chartData.shift();

        const w = chartCanvas.width;
        const h = chartCanvas.height;
        ctx.clearRect(0, 0, w, h);
        if (state.chartData.length < 2) {
            ctx.fillStyle = '#4a617c';
            ctx.font = '12px Inter';
            ctx.fillText('⏳ накопление данных...', 20, 50);
            return;
        }

        const data = state.chartData;
        const min = Math.min(...data) * 0.99;
        const max = Math.max(...data) * 1.01;
        const range = max - min || 1;
        const pad = 6;
        const graphW = w - pad * 2;
        const graphH = h - pad * 2;

        ctx.beginPath();
        ctx.strokeStyle = '#3b82f6';
        ctx.lineWidth = 2.5;
        ctx.shadowColor = 'rgba(59,130,246,0.3)';
        ctx.shadowBlur = 10;

        for (let i = 0; i < data.length; i++) {
            const x = pad + (i / (data.length - 1)) * graphW;
            const y = pad + graphH - ((data[i] - min) / range) * graphH;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.stroke();
        ctx.shadowBlur = 0;

        const lastX = pad + ((data.length - 1) / (data.length - 1)) * graphW;
        const lastY = pad + graphH - ((data[data.length - 1] - min) / range) * graphH;
        ctx.lineTo(lastX, pad + graphH);
        ctx.lineTo(pad, pad + graphH);
        ctx.closePath();
        const grad = ctx.createLinearGradient(0, pad, 0, pad + graphH);
        grad.addColorStop(0, 'rgba(59,130,246,0.2)');
        grad.addColorStop(0.6, 'rgba(59,130,246,0.05)');
        grad.addColorStop(1, 'rgba(59,130,246,0.01)');
        ctx.fillStyle = grad;
        ctx.fill();

        const points = state.tradePoints.filter(p => p.index < data.length);
        points.forEach(p => {
            const idx = p.index;
            const x = pad + (idx / (data.length - 1)) * graphW;
            const y = pad + graphH - ((p.price - min) / range) * graphH;
            const color = p.type === 'buy' ? '#4ade80' : '#f87171';

            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x, pad + graphH);
            ctx.strokeStyle = color;
            ctx.lineWidth = 1.5;
            ctx.setLineDash([4, 4]);
            ctx.stroke();
            ctx.setLineDash([]);

            ctx.beginPath();
            ctx.arc(x, y, 5, 0, 2 * Math.PI);
            ctx.fillStyle = color;
            ctx.shadowColor = color;
            ctx.shadowBlur = 14;
            ctx.fill();
            ctx.shadowBlur = 0;
        });

        const last = data[data.length - 1];
        const lx = pad + ((data.length - 1) / (data.length - 1)) * graphW;
        const ly = pad + graphH - ((last - min) / range) * graphH;
        ctx.beginPath();
        ctx.arc(lx, ly, 4, 0, 2 * Math.PI);
        ctx.fillStyle = '#60a5fa';
        ctx.shadowColor = 'rgba(59,130,246,0.5)';
        ctx.shadowBlur = 18;
        ctx.fill();
        ctx.shadowBlur = 0;
    }

    function renderMarket() {

            card.className = 'asset-card' + (asset.id === state.selectedAssetId ? ' active' : '');

            const chSign = ch >= 0 ? '▲' : '▼';
            
            card.innerHTML = `
                <div class="icon">${asset.symbol}</div>
                <div class="name">${asset.name}</div>
                <div class="price">${formatRub(asset.price)}</div>
                <div class="change ${chClass}">${chSign} ${Math.abs(ch).toFixed(2)}%</div>
            `;
            
            card.addEventListener('click', () => {
                state.selectedAssetId = asset.id;
                renderMarket();
                updatePriceDisplay();
                updateChart();
            });
            
            grid.appendChild(card);
        });
    }

        list.innerHTML = '';
        state.history.forEach(item => {

            div.className = 'history-item';
            const side = item.type === 'buy' ? 'side-buy' : 'side-sell';
            const txt = item.type === 'buy' ? 'Покупка' : 'Продажа';
            div.innerHTML = `<span><span class="${side}">${txt}</span> ${item.symbol} ${item.amount.toFixed(3)}</span><span>${formatRub(item.price)} • ${item.time}</span>`;
            list.appendChild(div);
        });
    }

    // ==================== ТОРГОВЛЯ ====================
    function executeTrade(type) {
        if (!isLoggedIn) { showToast('⚠️ Войдите в аккаунт!'); return; }
        const amount = state.tradeAmount;
        if (amount <= 0) return;
        const asset = getSelectedAsset();
        if (!asset) return;
        const price = asset.price;
        const totalCost = amount * price;

        const currentBalance = state.balances[asset.id] || 0;

        if (type === 'buy') {
            if (state.rub < totalCost) { showToast('❌ Недостаточно RUB!'); return; }
            state.rub -= totalCost;
            state.balances[asset.id] = (state.balances[asset.id] || 0) + amount;
            playBeep('buy');
            addHistory('buy', asset.symbol, amount, price);
            state.tradePoints.push({ price: price, type: 'buy', index: state.chartData.length - 1 });
        } else {
            if (currentBalance < amount) { showToast('❌ Недостаточно ' + asset.symbol + '!'); return; }
            state.balances[asset.id] = currentBalance - amount;
            state.rub += totalCost;
            playBeep('sell');
            addHistory('sell', asset.symbol, amount, price);
            state.tradePoints.push({ price: price, type: 'sell', index: state.chartData.length - 1 });
        }
        if (state.tradePoints.length > 30) state.tradePoints.shift();
        
        // Обновляем UI
        updateBalances();
        renderMarket();
        updatePriceDisplay();
        updateChart();
        renderPortfolio();
        
        // ✅ ПЕРЕСЧИТЫВАЕМ И СОХРАНЯЕМ total
        const total = calcTotal();
        saveToFirebase(total);
        
        showToast(`✅ ${type === 'buy' ? 'Покупка' : 'Продажа'} ${amount.toFixed(1)} ${asset.symbol}`);
    }

    // ==================== МАЙНИНГ ====================
    function renderShop() {
        const items = MINING_GEAR[currentShopTab] || [];
        const grid = document.getElementById('shopGrid');
        grid.innerHTML = '';
        
        items.forEach(item => {
            const count = state.gear[currentShopTab]?.[item.id] || 0;
            const card = document.createElement('div');
            card.className = 'shop-card';
            card.innerHTML = `
                <div style="font-size:24px;">${item.icon}</div>
                <div class="item-name">${item.name}</div>
                <div class="item-power">⚡ ${item.power} MH/s</div>
                <div class="item-price">${formatRub(item.price)}</div>
                <div class="item-count">🖥️ ${count} шт.</div>
                <button class="buy-btn" data-type="${currentShopTab}" data-id="${item.id}">Купить</button>
            `;
            grid.appendChild(card);
        });

        document.querySelectorAll('.buy-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (!isLoggedIn) { showToast('⚠️ Войдите в аккаунт!'); return; }
                const type = btn.dataset.type;
                const id = btn.dataset.id;
                const item = MINING_GEAR[type].find(g => g.id === id);
                if (!item) return;
                if (state.rub < item.price) {
                    showToast('❌ Недостаточно RUB для покупки ' + item.name);
                    return;
                }
                state.rub -= item.price;
                if (!state.gear[type]) state.gear[type] = {};
                state.gear[type][id] = (state.gear[type][id] || 0) + 1;
                updateBalances();
                updateMiningUI();
                renderShop();
                const total = calcTotal();
                saveToFirebase(total);
                showToast('✅ Куплен ' + item.name);
                playBeep('buy');
            });
        });
    }

    function updateMiningUI() {
        const power = calcTotalPower();
        document.getElementById('hashrateDisplay').textContent = power.toFixed(2) + ' MH/s';
        document.getElementById('minedDisplay').textContent = state.minedTotal.toFixed(4) + ' TON';
        const status = document.getElementById('miningStatus');
        status.textContent = state.miningActive ? '🟢 Работает' : '⏸ Остановлен';
        status.style.color = state.miningActive ? '#4ade80' : '#f87171';
        const btn = document.getElementById('toggleMiningBtn');
        btn.textContent = state.miningActive ? '⏹ Остановить' : '▶ Запустить';
        btn.classList.toggle('active', state.miningActive);
    }

    let miningInterval = null;

    function toggleMining() {
        if (!isLoggedIn) { showToast('⚠️ Войдите в аккаунт!'); return; }
        state.miningActive = !state.miningActive;
        if (state.miningActive) {
            const power = calcTotalPower();
            if (power === 0) {
                showToast('⚠️ Нет оборудования! Купите в магазине.');
                state.miningActive = false;
                updateMiningUI();
                return;
            }
            startMiningLoop();
            showToast('⛏️ Майнинг запущен');
        } else {
            if (miningInterval) {
                clearInterval(miningInterval);
                miningInterval = null;
            }
            showToast('⏸ Майнинг остановлен');
        }
        updateMiningUI();
        const total = calcTotal();
        saveToFirebase(total);
    }

    function startMiningLoop() {
        if (miningInterval) clearInterval(miningInterval);
        miningInterval = setInterval(() => {
            if (!state.miningActive || !isLoggedIn) return;
            const power = calcTotalPower();
            if (power === 0) {
                state.miningActive = false;
                updateMiningUI();
                clearInterval(miningInterval);
                miningInterval = null;
                showToast('⛔ Майнинг остановлен: нет оборудования');
                return;
            }
            const reward = power * 0.0002;
            state.minedTotal += reward;
            state.balances['ton'] = (state.balances['ton'] || 0) + reward;
            updateBalances();
            updateMiningUI();
            renderPortfolio();
            const total = calcTotal();
            saveToFirebase(total);
        }, 5000);
    }

    // ==================== ЗВУКИ ====================
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;

    function playBeep(type) {
        try {
            if (!audioCtx) audioCtx = new AudioCtx();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = type === 'buy' ? 880 : 440;
            gain.gain.value = 0.08;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.08);
        } catch(e) {}
    }

    // ==================== TOAST ====================
    let toastTimeout = null;
    function showToast(msg) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.classList.add('show');
        clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => el.classList.remove('show'), 2500);
    }

    // ==================== АВТОРИЗАЦИЯ ====================
    function registerUser() {
        const username = document.getElementById('usernameInput').value.trim();
        const password = document.getElementById('passwordInput').value.trim();
        if (!username || !password) {
            showToast('❌ Введите имя и пароль!');
            return;
        }
        if (password.length < 4) {
            showToast('❌ Пароль должен быть минимум 4 символа');
            return;
        }

        myUsername = username;
        myPassword = password;
        myUserId = 'user_' + username.replace(/\s/g, '_') + '_' + Date.now().toString(36);
        isAdmin = false;

        db.ref('users').orderByChild('username').equalTo(username).once('value')
            .then(snapshot => {
                const data = snapshot.val();
                if (data) {
                    showToast('❌ Пользователь с таким именем уже существует!');
                    return;
                }
                const userData = {
                    username: myUsername,
                    password: myPassword,
                    rub: 0,
                    balances: {},
                    gear: { gpu: {}, cpu: {}, ram: {} },
                    minedTotal: 0,
                    total: 0,
                    admin: false,
                    registered: Date.now()
                };
                DEFAULT_ASSETS.forEach(a => {
                    userData.balances[a.id] = a.id === 'ton' ? 1.0 : 0;
                });
                
                db.ref('users/' + myUserId).set(userData)
                    .then(() => {
                        showToast('✅ Регистрация успешна!');
                        isLoggedIn = true;
                        saveSession();
                        setTimeout(() => savePricesToFirebase(), 1000);
                        enterGame();
                    })
                    .catch(e => showToast('❌ Ошибка регистрации: ' + e.message));
            })
            .catch(e => showToast('❌ Ошибка: ' + e.message));
    }

    function loginUser() {
        const username = document.getElementById('usernameInput').value.trim();
        const password = document.getElementById('passwordInput').value.trim();
        if (!username || !password) {
            showToast('❌ Введите имя и пароль!');
            return;
        }

        db.ref('users').orderByChild('username').equalTo(username).once('value')
            .then(snapshot => {
                const data = snapshot.val();
                if (!data) {
                    showToast('❌ Пользователь не найден! Зарегистрируйтесь.');
                    return;
                }
                
                let found = false;
                for (const [id, user] of Object.entries(data)) {
                    if (user.username === username) {
                        if (user.password === password) {
                            myUserId = id;
                            myUsername = username;
                            myPassword = password;
                            isAdmin = user.admin || false;
                            isLoggedIn = true;
                            found = true;
                            break;
                        } else {
                            showToast('❌ Неправильный пароль!');
                            return;
                        }
                    }
                }
                
                if (found) {
                    saveSession();
                    enterGame();
                } else {
                    showToast('❌ Ошибка входа');
                }
            })
            .catch(e => showToast('❌ Ошибка: ' + e.message));
    }

    function logout() {
        if (miningInterval) {
            clearInterval(miningInterval);
            miningInterval = null;
            state.miningActive = false;
        }
        const total = calcTotal();
        saveToFirebase(total);
        clearSession();
        isLoggedIn = false;
        isAdmin = false;
        document.getElementById('loginOverlay').style.display = 'flex';
        document.getElementById('appContainer').style.display = 'none';
        showToast('👋 Вы вышли из аккаунта');
    }

    // ==================== СЕССИЯ ====================
    function saveSession() {
        if (!isLoggedIn) return;
        const session = {
            username: myUsername,
            userId: myUserId,
            password: myPassword,
            isAdmin: isAdmin,
            timestamp: Date.now()
        };
        setCookie('cryptoSession', session, 365);
    }

    function loadSession() {
        const session = getCookie('cryptoSession');
        if (session && session.username && session.userId) {
            myUsername = session.username;
            myUserId = session.userId;
            myPassword = session.password || '';
            isAdmin = session.isAdmin || false;
            isLoggedIn = true;
            return true;
        }
        return false;
    }

    function clearSession() {
        isLoggedIn = false;
        isAdmin = false;
        const session = {
            username: myUsername,
            userId: myUserId,
            password: myPassword,
            isAdmin: false,
            loggedOut: true,
            timestamp: Date.now()
        };
        setCookie('cryptoSession', session, 365);
    }

    function isSessionActive() {
        const session = getCookie('cryptoSession');
        if (session && session.username && session.userId && !session.loggedOut) {
            return true;
        }
        return false;
    }

    // ==================== ВХОД В ИГРУ ====================
    function enterGame() {
        document.getElementById('userNameDisplay').textContent = myUsername;
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('appContainer').style.display = 'block';

        if (isAdmin) {
            document.getElementById('adminTabBtn').style.display = 'block';
            document.getElementById('adminBadge').style.display = 'inline-block';
        }

        if (firebaseAvailable) {
            loadFromFirebase().then(() => {
                loadPricesFromFirebase();
                syncPrices();
                loadLeaderboard();
                if (isAdmin) loadAdminUsers();
                initGame();
            });
            
            db.ref('.info/connected').on('value', snap => {
                if (snap.val() === true) {
                    document.getElementById('onlineStatus').textContent = '🟢 Онлайн';
                    document.getElementById('onlineStatus').style.color = '#4ade80';
                    if (isLoggedIn) {
                        const total = calcTotal();
                        saveToFirebase(total);
                    }
                }
            });
        } else {
            document.getElementById('onlineStatus').textContent = '📡 Офлайн режим';
            document.getElementById('onlineStatus').style.color = '#fbbf24';
            initGame();
        }
    }

    function loadLeaderboard() {
        if (!firebaseAvailable) {
            document.getElementById('leaderboardList').innerHTML = '<div style="color:#4a617c; text-align:center; padding:20px;">Офлайн режим</div>';
            return;
        }
        
        db.ref('users').orderByChild('total').limitToLast(20).on('value', snapshot => {
            const data = snapshot.val();
            if (!data) {
                document.getElementById('leaderboardList').innerHTML = '<div style="color:#4a617c; text-align:center; padding:20px;">Нет игроков</div>';
                return;
            }
            const entries = Object.entries(data).filter(([id, u]) => u.username && u.total !== undefined);
            entries.sort((a, b) => b[1].total - a[1].total);
            let html = '<div class="history-title">🏆 Топ игроков</div>';
            entries.slice(0, 20).forEach(([id, u], i) => {
                const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i+1}.`;
                const adminTag = u.admin ? ' 👑' : '';
                html += `<div class="lb-item"><span class="name">${medal} ${u.username}${adminTag}</span><span class="total">${formatRub(u.total || 0)}</span></div>`;
            });
            document.getElementById('leaderboardList').innerHTML = html;
            document.getElementById('onlineCount').textContent = entries.length;
        });
    }

    // ==================== ИНИЦИАЛИЗАЦИЯ ====================
    function initGame() {
        renderMarket();
        updateBalances();
        updatePriceDisplay();
        document.getElementById('tradeAmount').textContent = state.tradeAmount.toFixed(1);
        renderHistory();
        updateChart();
        renderShop();
        updateMiningUI();
        renderPortfolio();

        if (state.miningActive && isLoggedIn) {
            startMiningLoop();
            updateMiningUI();
        }

        setInterval(() => {
            if (isLoggedIn && firebaseAvailable) {
                state.assets.forEach(asset => {
                    const volatility = (Math.random() * 4 - 2) / 100;
                    let newPrice = asset.price * (1 + volatility);
                    if (newPrice < 0.001) newPrice = 0.001;
                    newPrice = Math.round(newPrice * 100) / 100;
                    
                    const oldPrice = asset.price;
                    if (newPrice !== oldPrice) {
                        asset.price = newPrice;
                        const change = ((asset.price - oldPrice) / oldPrice) * 100;
                        asset.change = Math.round(change * 100) / 100;
                    }
                });
                
                const prices = {};
                state.assets.forEach(a => { prices[a.id] = a.price; });
                db.ref('prices').update(prices)
                    .then(() => {
                        renderMarket();
                        updatePriceDisplay();
                        updateChart();
                        updateBalances();
                        renderPortfolio();
                    })
                    .catch(e => console.warn(e));
            }
        }, 5000);

        setInterval(() => { 
            if (isLoggedIn) {
                const total = calcTotal();
                saveToFirebase(total);
            }
        }, 15000);
    }

    // ==================== СОБЫТИЯ ====================
    document.addEventListener('DOMContentLoaded', () => {
        if (loadSession() && isSessionActive() && firebaseAvailable) {
            db.ref('users/' + myUserId).once('value')
                .then(snapshot => {
                    if (snapshot.exists()) {
                        const data = snapshot.val();
                        isAdmin = data.admin || false;
                        document.getElementById('userNameDisplay').textContent = myUsername;
                        isLoggedIn = true;
                        document.getElementById('loginOverlay').style.display = 'none';
                        document.getElementById('appContainer').style.display = 'block';
                        loadFromFirebase().then(() => {
                            loadPricesFromFirebase();
                            syncPrices();
                            loadLeaderboard();
                            if (isAdmin) {
                                document.getElementById('adminTabBtn').style.display = 'block';
                                document.getElementById('adminBadge').style.display = 'inline-block';
                                loadAdminUsers();
                            }
                            initGame();
                        });
                    } else {
                        clearSession();
                        isLoggedIn = false;
                    }
                })
                .catch(() => {});
        } else if (loadSession() && isSessionActive()) {
            document.getElementById('userNameDisplay').textContent = myUsername;
            isLoggedIn = true;
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('appContainer').style.display = 'block';
            if (isAdmin) {
                document.getElementById('adminTabBtn').style.display = 'block';
                document.getElementById('adminBadge').style.display = 'inline-block';
            }
            loadPricesFromFirebase();
            initGame();
        }

        // Login/Register
        document.getElementById('loginBtn').addEventListener('click', () => {
            if (document.getElementById('registerLink').textContent.includes('Зарегистрироваться')) {
                registerUser();
            } else {
                loginUser();
            }
        });

        document.getElementById('registerLink').addEventListener('click', () => {
            const link = document.getElementById('registerLink');
            const btn = document.getElementById('loginBtn');
            if (link.textContent.includes('Зарегистрироваться')) {
                link.textContent = '🔑 Уже есть аккаунт? Войти';
                btn.textContent = '📝 Зарегистрироваться';
            } else {
                link.textContent = '📝 Зарегистрироваться';
                btn.textContent = '🔑 Войти';
            }
        });

        document.getElementById('usernameInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('loginBtn').click();
        });
        document.getElementById('passwordInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('loginBtn').click();
        });

        // Tabs
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
                document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
                if (btn.dataset.tab === 'leaderboard') loadLeaderboard();
                if (btn.dataset.tab === 'portfolio') renderPortfolio();
                if (btn.dataset.tab === 'admin' && isAdmin) loadAdminUsers();
            });
        });

        // Shop tabs
        document.querySelectorAll('.shop-tab').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.shop-tab').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentShopTab = btn.dataset.shop;
                renderShop();
            });
        });

        // Trade controls
        document.getElementById('decAmount').addEventListener('click', () => {
            let v = state.tradeAmount - 0.5;
            if (v < 0.1) v = 0.1;
            state.tradeAmount = Math.round(v * 10) / 10;
            document.getElementById('tradeAmount').textContent = state.tradeAmount.toFixed(1);
        });
        document.getElementById('incAmount').addEventListener('click', () => {
            let v = state.tradeAmount + 0.5;
            if (v > 100) v = 100;
            state.tradeAmount = Math.round(v * 10) / 10;
            document.getElementById('tradeAmount').textContent = state.tradeAmount.toFixed(1);
        });
        document.getElementById('buyBtn').addEventListener('click', () => executeTrade('buy'));
        document.getElementById('sellBtn').addEventListener('click', () => executeTrade('sell'));

        // Mining
        document.getElementById('toggleMiningBtn').addEventListener('click', toggleMining);
        document.getElementById('mineCoinSelect').addEventListener('change', () => {
            state.miningCoin = document.getElementById('mineCoinSelect').value;
            const total = calcTotal();
            saveToFirebase(total);
        });

        // Reset
        document.getElementById('resetBtn').addEventListener('click', () => {
            if (!isLoggedIn) { showToast('⚠️ Войдите в аккаунт!'); return; }
            if (confirm('Сбросить прогресс?')) {
                if (miningInterval) { clearInterval(miningInterval); miningInterval = null; }
                state.rub = 0;
                state.balances = {};
                DEFAULT_ASSETS.forEach(a => {
                    state.balances[a.id] = a.id === 'ton' ? 1.0 : 0;
                });
                state.history = [];
                state.selectedAssetId = 'ton';
                state.tradeAmount = 1.0;
                state.chartData = [];
                state.tradePoints = [];
                state.gear = { gpu: {}, cpu: {}, ram: {} };
                state.minedTotal = 0;
                state.miningActive = false;
                renderMarket();
                updateBalances();
                updatePriceDisplay();
                document.getElementById('tradeAmount').textContent = '1.0';
                renderHistory();
                updateChart();
                renderShop();
                updateMiningUI();
                renderPortfolio();
                const total = calcTotal();
                saveToFirebase(total);
                showToast('🔄 Сброшено');
            }
        });

        // Save
        document.getElementById('saveBtn').addEventListener('click', () => {
            if (!isLoggedIn) { showToast('⚠️ Войдите в аккаунт!'); return; }
            const total = calcTotal();
            saveToFirebase(total);
            savePricesToFirebase();
            showToast('✅ Сохранено в Firebase');
        });

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', () => {
            if (confirm('Выйти из аккаунта?')) {
                logout();
            }
        });

        // Admin
        document.getElementById('adminAddCoinBtn').addEventListener('click', adminAddCoin);
        document.getElementById('adminSetCoinBtn').addEventListener('click', adminSetCoin);
    });
    </script>
</body>
</html>
