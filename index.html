<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=no">
    <title>P2P Крипто-трейдер + Майнинг</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #0a0e17;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            color: #eef4fa;
        }

        .glass {
            background: rgba(18, 28, 46, 0.55);
            backdrop-filter: blur(32px) saturate(180%);
            -webkit-backdrop-filter: blur(32px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.06);
            border-radius: 44px;
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .glass:hover {
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 12px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .app-container {
            max-width: 920px;
            width: 100%;
            padding: 24px 22px 28px;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.25);
            padding: 6px;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .tab-btn {
            flex: 1;
            padding: 12px 8px;
            border: none;
            border-radius: 40px;
            background: transparent;
            color: #8ba0be;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 0.3px;
        }

        .tab-btn.active {
            background: rgba(59, 130, 246, 0.2);
            color: white;
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.08);
        }

        .tab-btn:active { transform: scale(0.96); }

        .tab-content {
            display: none;
            animation: fadeSlide 0.3s ease;
        }

        .tab-content.active { display: block; }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .balance-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }

        .balance-item {
            background: rgba(0, 0, 0, 0.25);
            padding: 8px 14px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            flex: 1 1 90px;
            min-width: 70px;
            display: flex;
            align-items: center;
            gap: 6px;
            backdrop-filter: blur(4px);
        }

        .balance-item .label {
            color: #8ba0be;
            font-size: 12px;
            font-weight: 500;
        }

        .balance-item .value {
            font-weight: 700;
            font-size: 16px;
            padding: 0 6px;
            border-radius: 30px;
        }

        .value.rub { color: #7bc9ff; }
        .value.ton { color: #6ee7b7; }
        .value.total { color: #c8b6ff; }

        .chart-wrapper {
            padding: 14px 12px 8px;
            margin: 6px 0 14px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            position: relative;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 4px 8px 4px;
        }

        .chart-header .pair {
            font-weight: 600;
            font-size: 16px;
            color: #d6e8ff;
        }

        .chart-header .price-badge {
            background: rgba(0, 0, 0, 0.3);
            padding: 4px 16px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 16px;
            border: 1px solid rgba(255,255,255,0.04);
        }

        #priceChart {
            width: 100%;
            height: 130px;
            display: block;
            border-radius: 16px;
            background: transparent;
        }

        .market-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(105px, 1fr));
            gap: 6px;
            margin: 12px 0 16px;
        }

        .asset-card {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            padding: 8px 4px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            cursor: pointer;
            transition: 0.15s;
            text-align: center;
            backdrop-filter: blur(4px);
        }

        .asset-card.active {
            border: 2px solid #3b82f6;
            background: rgba(59, 130, 246, 0.1);
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.08);
        }

        .asset-card:active { transform: scale(0.94); }
        .asset-card .icon { font-size: 20px; }
        .asset-card .name { font-weight: 600; font-size: 12px; color: #dce8f5; }
        .asset-card .price { font-size: 11px; color: #a8c0dd; background: rgba(0,0,0,0.2); padding: 0 8px; border-radius: 30px; display: inline-block; }
        .asset-card .change { font-size: 11px; font-weight: 500; }
        .positive { color: #4ade80; }
        .negative { color: #f87171; }

        .trade-panel {
            padding: 14px 14px 12px;
            margin: 4px 0 12px;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .trade-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }

        .trade-top .selected-label {
            font-weight: 500;
            color: #b6cef0;
            background: rgba(0, 0, 0, 0.2);
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 14px;
        }

        .amount-control {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.25);
            padding: 2px 8px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .amount-control button {
            background: none;
            border: none;
            color: #b7d6f5;
            font-size: 24px;
            font-weight: 300;
            cursor: pointer;
            width: 28px;
            transition: 0.1s;
        }
        .amount-control button:active { transform: scale(1.3); color: white; }
        .amount-control span {
            font-size: 20px;
            font-weight: 700;
            min-width: 44px;
            text-align: center;
            color: white;
        }

        .trade-buttons {
            display: flex;
            gap: 10px;
            margin: 12px 0 4px;
        }

        .trade-btn {
            flex: 1;
            padding: 12px 8px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 15px;
            transition: 0.1s;
            cursor: pointer;
            box-shadow: 0 4px 0 #0b121a;
        }

        .trade-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #0b121a; }
        .trade-btn.buy { background: #0f3b2a; color: #7ddfa0; border: 1px solid #1b7a4a; }
        .trade-btn.sell { background: #4a1e28; color: #f7a1b0; border: 1px solid #aa3f52; }

        .trade-info {
            display: flex;
            justify-content: space-between;
            color: #8ba0be;
            font-size: 12px;
            padding: 0 4px;
            margin-top: 6px;
        }
        .trade-info span:last-child { color: #d6e8ff; font-weight: 500; }

        .history-box {
            margin-top: 12px;
            padding: 8px 12px 2px;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            max-height: 110px;
            overflow-y: auto;
        }
        .history-box::-webkit-scrollbar { width: 3px; }
        .history-box::-webkit-scrollbar-thumb { background: #2a4055; border-radius: 10px; }

        .history-title {
            color: #6e88a3;
            font-size: 10px;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid rgba(255,255,255,0.02);
            font-size: 12px;
            color: #b8cfeb;
        }
        .history-item:last-child { border-bottom: none; }
        .history-item .side-buy { color: #4ade80; }
        .history-item .side-sell { color: #f87171; }

        .mining-panel {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .mining-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            background: rgba(0, 0, 0, 0.15);
            padding: 12px 14px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            justify-content: space-between;
            align-items: center;
        }

        .mining-stats .stat {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
        }

        .mining-stats .stat .val {
            font-weight: 700;
            color: #b7e0ff;
        }

        .mining-stats .stat .val.green { color: #6ee7b7; }

        .mining-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .mining-controls select {
            background: rgba(0, 0, 0, 0.3);
            color: #d6e8ff;
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 8px 14px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            outline: none;
        }

        .mining-controls select option { background: #0b121a; color: white; }

        .mining-btn {
            padding: 10px 24px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: 0.15s;
            background: #1a3a4a;
            color: #8fd0e8;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 4px 0 #0a1a22;
        }

        .mining-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #0a1a22; }
        .mining-btn.active { background: #0f3b2a; color: #7ddfa0; border-color: #1b7a4a; }

        .gpu-shop {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 8px;
            margin-top: 4px;
        }

        .gpu-card {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 24px;
            padding: 12px 8px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            text-align: center;
            transition: 0.15s;
        }

        .gpu-card .gpu-name {
            font-weight: 600;
            font-size: 13px;
            color: #d6e8ff;
        }

        .gpu-card .gpu-hash {
            font-size: 11px;
            color: #8ba0be;
        }

        .gpu-card .gpu-price {
            font-size: 12px;
            color: #b7e0ff;
            font-weight: 600;
            margin: 4px 0;
        }

        .gpu-card .gpu-count {
            font-size: 11px;
            color: #8ba0be;
        }

        .gpu-card .buy-gpu-btn {
            margin-top: 6px;
            padding: 6px 16px;
            border: none;
            border-radius: 30px;
            background: #1a3a4a;
            color: #8fd0e8;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: 0.1s;
            border: 1px solid rgba(255,255,255,0.04);
        }

        .gpu-card .buy-gpu-btn:active { transform: scale(0.94); background: #2a5a6a; }

        .reset-area {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 14px;
        }

        .reset-btn, .save-btn {
            background: transparent;
            border: 1px solid #2f4862;
            color: #8baecf;
            padding: 5px 20px;
            border-radius: 40px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.1s;
        }
        .reset-btn:active, .save-btn:active { background: #1f3142; color: white; }

        .footer-note {
            text-align: center;
            color: #3f5b78;
            font-size: 10px;
            margin-top: 10px;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(16, 28, 46, 0.9);
            backdrop-filter: blur(20px);
            color: #d6e8ff;
            padding: 10px 28px;
            border-radius: 40px;
            font-size: 14px;
            border: 1px solid rgba(59, 130, 246, 0.2);
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            z-index: 999;
            opacity: 0;
            transition: opacity 0.25s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }

        @media (max-width: 600px) {
            .app-container { padding: 16px; }
            .balance-item .value { font-size: 14px; }
            .market-grid { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); }
            .gpu-shop { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
        }
    </style>
</head>
<body>

<div class="app-container glass">
    <div class="tabs">
        <button class="tab-btn active" data-tab="trade">📊 Трейдинг</button>
        <button class="tab-btn" data-tab="mining">⛏️ Майнинг</button>
    </div>

    <div id="tab-trade" class="tab-content active">
        <div class="balance-panel">
            <div class="balance-item"><span class="label">🇷🇺 RUB</span><span class="value rub" id="rubBalance">0 ₽</span></div>
            <div class="balance-item"><span class="label">🔶 TON</span><span class="value ton" id="tonBalance">1.0000 TON</span></div>
            <div class="balance-item"><span class="label">📊 итого</span><span class="value total" id="totalValue">0 ₽</span></div>
        </div>

        <div class="chart-wrapper">
            <div class="chart-header">
                <span class="pair" id="chartPair">TON / RUB</span>
                <span class="price-badge" id="chartPrice">240.50 ₽</span>
            </div>
            <canvas id="priceChart" width="700" height="130"></canvas>
        </div>

        <div class="market-grid" id="marketGrid"></div>

        <div class="trade-panel">
            <div class="trade-top">
                <span class="selected-label" id="selectedLabel">🔶 TONCOIN</span>
                <div class="amount-control">
                    <button id="decAmount">−</button>
                    <span id="tradeAmount">1.0</span>
                    <button id="incAmount">+</button>
                </div>
            </div>
            <div class="trade-buttons">
                <button class="trade-btn buy" id="buyBtn">🟢 Купить</button>
                <button class="trade-btn sell" id="sellBtn">🔴 Продать</button>
            </div>
            <div class="trade-info">
                <span>Цена (RUB)</span>
                <span id="currentPriceDisplay">—</span>
            </div>
        </div>

        <div class="history-box">
            <div class="history-title">📋 последние сделки</div>
            <div id="historyList"><div class="history-item" style="color:#4a617c;">Начните торговать</div></div>
        </div>
    </div>

    <div id="tab-mining" class="tab-content">
        <div class="mining-panel">
            <div class="mining-stats">
                <div class="stat">⛏️ Хешрейт: <span class="val green" id="hashrateDisplay">0.00 MH/s</span></div>
                <div class="stat">💰 Добыто: <span class="val" id="minedDisplay">0.0000 TON</span></div>
                <div class="stat">⚡ Активно: <span class="val" id="miningStatus">Выключен</span></div>
            </div>

            <div class="mining-controls">
                <select id="mineCoinSelect">
                    <option value="ton">TONCOIN</option>
                    <option value="btc">BTC</option>
                    <option value="eth">ETH</option>
                    <option value="sol">SOL</option>
                    <option value="xrp">XRP</option>
                </select>
                <button class="mining-btn" id="toggleMiningBtn">▶ Запустить майнинг</button>
            </div>

            <div style="margin-top: 6px; font-size: 13px; color: #8ba0be;">🛒 Магазин видеокарт</div>
            <div class="gpu-shop" id="gpuShop"></div>
        </div>
    </div>

    <div class="reset-area">
        <button class="reset-btn" id="resetBtn">⟳ Сброс</button>
        <button class="save-btn" id="saveBtn">💾 Сохранить</button>
    </div>
    <div class="footer-note">P2P симулятор • 10 активов • Майнинг • Liquid Glass</div>
</div>

<div id="toast" class="toast"></div>

<script>
    (function() {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function playBeep(type) {
            try {
                if (!audioCtx) audioCtx = new AudioCtx();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.value = type === 'buy' ? 880 : 440;
                gain.gain.value = 0.08;
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.08);
                if (type === 'buy') setTimeout(() => { osc.frequency.value = 1100; }, 30);
            } catch(e) {}
        }

        function setCookie(name, value, days = 14) {
            const d = new Date();
            d.setTime(d.getTime() + days * 24 * 60 * 60 * 1000);
            document.cookie = name + "=" + JSON.stringify(value) + "; expires=" + d.toUTCString() + "; path=/";
        }

        function getCookie(name) {
            const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
            if (match) {
                try { return JSON.parse(decodeURIComponent(match[2])); } catch(e) { return null; }
            }
            return null;
        }

        const DEFAULT_ASSETS = [
            { id: 'ton', name: 'TONCOIN', symbol: '🔶', price: 240.50, change: 0 },
            { id: 'btc', name: 'BTC', symbol: '₿', price: 4520000, change: 0 },
            { id: 'eth', name: 'ETH', symbol: '⟠', price: 324000, change: 0 },
            { id: 'usdt', name: 'USDT', symbol: '💵', price: 92.30, change: 0 },
            { id: 'sol', name: 'SOL', symbol: '◎', price: 182.40, change: 0 },
            { id: 'ada', name: 'ADA', symbol: '₳', price: 0.68, change: 0 },
            { id: 'xrp', name: 'XRP', symbol: '✕', price: 0.62, change: 0 },
            { id: 'dot', name: 'DOT', symbol: '●', price: 8.75, change: 0 },
            { id: 'avax', name: 'AVAX', symbol: '▲', price: 42.10, change: 0 },
            { id: 'matic', name: 'MATIC', symbol: '◆', price: 0.83, change: 0 },
        ];

        // НОВЫЕ ВИДЕОКАРТЫ: старые дешёвые + новые
        const GPU_TYPES = [
            // старые дешёвые
            { id: 'gtx750ti', name: 'GTX 750 Ti', hash: 0.3, price: 3500 },
            { id: 'gtx960', name: 'GTX 960', hash: 0.5, price: 5500 },
            { id: 'rx560', name: 'RX 560', hash: 0.6, price: 6500 },
            { id: 'gtx1050ti', name: 'GTX 1050 Ti', hash: 0.8, price: 8500 },
            { id: 'rx570', name: 'RX 570', hash: 1.0, price: 12000 },
            // средние
            { id: 'rx6600', name: 'RX 6600', hash: 1.8, price: 22000 },
            { id: 'rx7600', name: 'RX 7600', hash: 2.5, price: 35000 },
            { id: 'rx9600tx', name: 'RX 9600 TX', hash: 4.0, price: 62000 },
            // топовые
            { id: 'rtx4060', name: 'RTX 4060', hash: 3.2, price: 42000 },
            { id: 'rtx4070', name: 'RTX 4070', hash: 5.0, price: 78000 },
            { id: 'rtx4090', name: 'RTX 4090', hash: 9.0, price: 165000 },
        ];

        let state = {
            rub: 0,
            ton: 1.0,
            assets: JSON.parse(JSON.stringify(DEFAULT_ASSETS)),
            history: [],
            selectedAssetId: 'ton',
            tradeAmount: 1.0,
            chartData: [],
            tradePoints: [], // { price, type, index }
            gpus: {},
            miningActive: false,
            minedTotal: 0,
            miningCoin: 'ton',
            hashPerGPU: 0,
        };

        // DOM
        const rubEl = document.getElementById('rubBalance');
        const tonEl = document.getElementById('tonBalance');
        const totalValueEl = document.getElementById('totalValue');
        const marketGrid = document.getElementById('marketGrid');
        const selectedLabel = document.getElementById('selectedLabel');
        const currentPriceDisplay = document.getElementById('currentPriceDisplay');
        const tradeAmountSpan = document.getElementById('tradeAmount');
        const historyList = document.getElementById('historyList');
        const chartCanvas = document.getElementById('priceChart');
        const ctx = chartCanvas.getContext('2d');
        const chartPair = document.getElementById('chartPair');
        const chartPrice = document.getElementById('chartPrice');
        const toastEl = document.getElementById('toast');

        const hashrateDisplay = document.getElementById('hashrateDisplay');
        const minedDisplay = document.getElementById('minedDisplay');
        const miningStatus = document.getElementById('miningStatus');
        const gpuShop = document.getElementById('gpuShop');
        const toggleMiningBtn = document.getElementById('toggleMiningBtn');
        const mineCoinSelect = document.getElementById('mineCoinSelect');

        function formatRub(v) {
            if (v >= 1000) return v.toLocaleString('ru-RU', { minimumFractionDigits: 0, maximumFractionDigits: 0 }) + ' ₽';
            return v.toFixed(2) + ' ₽';
        }
        function formatTon(v) { return v.toFixed(4) + ' TON'; }

        function getAsset(id) { return state.assets.find(a => a.id === id); }
        function getSelectedPrice() { const a = getAsset(state.selectedAssetId); return a ? a.price : 0; }
        function getSelectedAsset() { return getAsset(state.selectedAssetId); }

        function saveGame() {
            const data = {
                rub: state.rub,
                ton: state.ton,
                assets: state.assets,
                history: state.history.slice(0, 30),
                selectedAssetId: state.selectedAssetId,
                tradeAmount: state.tradeAmount,
                chartData: state.chartData.slice(-50),
                tradePoints: state.tradePoints.slice(-20),
                gpus: state.gpus,
                minedTotal: state.minedTotal,
                miningCoin: state.miningCoin,
                miningActive: state.miningActive,
            };
            setCookie('cryptoTraderSave', data, 14);
            showToast('✅ Сохранено');
        }

        function loadGame() {
            const saved = getCookie('cryptoTraderSave');
            if (saved) {
                try {
                    state.rub = saved.rub ?? 0;
                    state.ton = saved.ton ?? 1.0;
                    if (saved.assets && Array.isArray(saved.assets)) {
                        const savedMap = {};
                        saved.assets.forEach(a => { savedMap[a.id] = a; });
                        state.assets = DEFAULT_ASSETS.map(def => {
                            const s = savedMap[def.id];
                            return s ? { ...def, ...s } : { ...def };
                        });
                    }
                    state.history = saved.history || [];
                    state.selectedAssetId = saved.selectedAssetId || 'ton';
                    state.tradeAmount = saved.tradeAmount ?? 1.0;
                    state.chartData = saved.chartData || [];
                    state.tradePoints = saved.tradePoints || [];
                    if (state.chartData.length > 60) state.chartData = state.chartData.slice(-50);
                    if (state.tradePoints.length > 30) state.tradePoints = state.tradePoints.slice(-20);
                    state.gpus = saved.gpus || {};
                    state.minedTotal = saved.minedTotal || 0;
                    state.miningCoin = saved.miningCoin || 'ton';
                    state.miningActive = saved.miningActive || false;
                    return true;
                } catch(e) { console.warn('Load error', e); }
            }
            return false;
        }

        function updateBalances() {
            rubEl.textContent = formatRub(state.rub);
            tonEl.textContent = formatTon(state.ton);
            const tonPrice = getAsset('ton')?.price || 240.5;
            const total = state.rub + state.ton * tonPrice;
            totalValueEl.textContent = formatRub(total);
        }

        function updatePriceDisplay() {
            const asset = getSelectedAsset();
            if (asset) {
                currentPriceDisplay.textContent = formatRub(asset.price);
                selectedLabel.textContent = asset.symbol + ' ' + asset.name;
                chartPair.textContent = asset.symbol + ' / RUB';
                chartPrice.textContent = formatRub(asset.price);
            }
        }

        // ГРАФИК с точками сделок
        function updateChart() {
            const asset = getSelectedAsset();
            if (!asset) return;
            state.chartData.push(asset.price);
            if (state.chartData.length > 60) state.chartData.shift();

            const w = chartCanvas.width;
            const h = chartCanvas.height;
            ctx.clearRect(0, 0, w, h);
            if (state.chartData.length < 2) {
                ctx.fillStyle = '#4a617c';
                ctx.font = '12px Inter';
                ctx.fillText('⏳ накопление данных...', 20, 50);
                return;
            }

            const data = state.chartData;
            const min = Math.min(...data) * 0.99;
            const max = Math.max(...data) * 1.01;
            const range = max - min || 1;
            const pad = 6;
            const graphW = w - pad * 2;
            const graphH = h - pad * 2;

            // линия
            ctx.beginPath();
            ctx.strokeStyle = '#3b82f6';
            ctx.lineWidth = 2.5;
            ctx.shadowColor = 'rgba(59,130,246,0.3)';
            ctx.shadowBlur = 10;

            for (let i = 0; i < data.length; i++) {
                const x = pad + (i / (data.length - 1)) * graphW;
                const y = pad + graphH - ((data[i] - min) / range) * graphH;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
            ctx.shadowBlur = 0;

            // заливка
            const lastX = pad + ((data.length - 1) / (data.length - 1)) * graphW;
            const lastY = pad + graphH - ((data[data.length - 1] - min) / range) * graphH;
            ctx.lineTo(lastX, pad + graphH);
            ctx.lineTo(pad, pad + graphH);
            ctx.closePath();
            const grad = ctx.createLinearGradient(0, pad, 0, pad + graphH);
            grad.addColorStop(0, 'rgba(59,130,246,0.2)');
            grad.addColorStop(0.6, 'rgba(59,130,246,0.05)');
            grad.addColorStop(1, 'rgba(59,130,246,0.01)');
            ctx.fillStyle = grad;
            ctx.fill();

            // ТОЧКИ СДЕЛОК с линиями
            const points = state.tradePoints.filter(p => p.index < data.length);
            points.forEach(p => {
                const idx = p.index;
                const x = pad + (idx / (data.length - 1)) * graphW;
                const y = pad + graphH - ((p.price - min) / range) * graphH;
                const color = p.type === 'buy' ? '#4ade80' : '#f87171';

                // вертикальная линия от точки до низа графика
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(x, pad + graphH);
                ctx.strokeStyle = color;
                ctx.lineWidth = 1.5;
                ctx.setLineDash([4, 4]);
                ctx.stroke();
                ctx.setLineDash([]);

                // точка
                ctx.beginPath();
                ctx.arc(x, y, 5, 0, 2 * Math.PI);
                ctx.fillStyle = color;
                ctx.shadowColor = color;
                ctx.shadowBlur = 14;
                ctx.fill();
                ctx.shadowBlur = 0;

                // обводка точки
                ctx.beginPath();
                ctx.arc(x, y, 7, 0, 2 * Math.PI);
                ctx.strokeStyle = color;
                ctx.lineWidth = 2;
                ctx.globalAlpha = 0.3;
                ctx.stroke();
                ctx.globalAlpha = 1;
            });

            // последняя точка свечение
            const last = data[data.length - 1];
            const lx = pad + ((data.length - 1) / (data.length - 1)) * graphW;
            const ly = pad + graphH - ((last - min) / range) * graphH;
            ctx.beginPath();
            ctx.arc(lx, ly, 4, 0, 2 * Math.PI);
            ctx.fillStyle = '#60a5fa';
            ctx.shadowColor = 'rgba(59,130,246,0.5)';
            ctx.shadowBlur = 18;
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function renderMarket() {
            marketGrid.innerHTML = '';
            state.assets.forEach(asset => {
                const card = document.createElement('div');
                card.className = 'asset-card' + (asset.id === state.selectedAssetId ? ' active' : '');
                const ch = asset.change;
                const chClass = ch >= 0 ? 'positive' : 'negative';
                const chSign = ch >= 0 ? '▲' : '▼';
                card.innerHTML = `
                    <div class="icon">${asset.symbol}</div>
                    <div class="name">${asset.name}</div>
                    <div class="price">${formatRub(asset.price)}</div>
                    <div class="change ${chClass}">${chSign} ${Math.abs(ch).toFixed(2)}%</div>
                `;
                card.addEventListener('click', () => {
                    state.selectedAssetId = asset.id;
                    renderMarket();
                    updatePriceDisplay();
                    updateChart();
                });
                marketGrid.appendChild(card);
            });
        }

        function addHistory(type, symbol, amount, price) {
            state.history.unshift({
                type, symbol, amount: Math.round(amount * 1000) / 1000,
                price: Math.round(price * 100) / 100,
                time: new Date().toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit' })
            });
            if (state.history.length > 30) state.history.pop();
            renderHistory();
        }

        function renderHistory() {
            if (state.history.length === 0) {
                historyList.innerHTML = `<div class="history-item" style="color:#4a617c;">Сделок пока нет</div>`;
                return;
            }
            historyList.innerHTML = '';
            state.history.forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                const side = item.type === 'buy' ? 'side-buy' : 'side-sell';
                const txt = item.type === 'buy' ? 'Покупка' : 'Продажа';
                div.innerHTML = `<span><span class="${side}">${txt}</span> ${item.symbol} ${item.amount.toFixed(3)}</span><span>${formatRub(item.price)} • ${item.time}</span>`;
                historyList.appendChild(div);
            });
        }

        function executeTrade(type) {
            const amount = state.tradeAmount;
            if (amount <= 0) return;
            const asset = getSelectedAsset();
            if (!asset) return;
            const price = asset.price;
            const totalCost = amount * price;

            if (type === 'buy') {
                if (state.rub < totalCost) { showToast('❌ Недостаточно RUB!'); return; }
                state.rub -= totalCost;
                state.ton += amount;
                playBeep('buy');
                addHistory('buy', asset.symbol, amount, price);
                // добавляем точку на график
                state.tradePoints.push({ price: price, type: 'buy', index: state.chartData.length - 1 });
                if (state.tradePoints.length > 30) state.tradePoints.shift();
            } else {
                if (state.ton < amount) { showToast('❌ Недостаточно TONCOIN!'); return; }
                state.ton -= amount;
                state.rub += totalCost;
                playBeep('sell');
                addHistory('sell', asset.symbol, amount, price);
                state.tradePoints.push({ price: price, type: 'sell', index: state.chartData.length - 1 });
                if (state.tradePoints.length > 30) state.tradePoints.shift();
            }
            updateBalances();
            renderMarket();
            updatePriceDisplay();
            updateChart();
            saveGame();
        }

        // МАЙНИНГ
        function calcHashrate() {
            let total = 0;
            for (const [id, count] of Object.entries(state.gpus)) {
                const gpu = GPU_TYPES.find(g => g.id === id);
                if (gpu) total += gpu.hash * count;
            }
            state.hashPerGPU = total;
            return total;
        }

        function renderGPUshop() {
            gpuShop.innerHTML = '';
            GPU_TYPES.forEach(gpu => {
                const count = state.gpus[gpu.id] || 0;
                const card = document.createElement('div');
                card.className = 'gpu-card';
                card.innerHTML = `
                    <div class="gpu-name">${gpu.name}</div>
                    <div class="gpu-hash">⚡ ${gpu.hash} MH/s</div>
                    <div class="gpu-price">${formatRub(gpu.price)}</div>
                    <div class="gpu-count">🖥️ ${count} шт.</div>
                    <button class="buy-gpu-btn" data-gpu-id="${gpu.id}">Купить</button>
                `;
                gpuShop.appendChild(card);
            });

            document.querySelectorAll('.buy-gpu-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const gpuId = btn.dataset.gpuId;
                    const gpu = GPU_TYPES.find(g => g.id === gpuId);
                    if (!gpu) return;
                    if (state.rub < gpu.price) {
                        showToast('❌ Недостаточно RUB для покупки ' + gpu.name);
                        return;
                    }
                    state.rub -= gpu.price;
                    state.gpus[gpuId] = (state.gpus[gpuId] || 0) + 1;
                    updateBalances();
                    updateMiningUI();
                    renderGPUshop();
                    saveGame();
                    showToast('✅ Куплен ' + gpu.name);
                    playBeep('buy');
                });
            });
        }

        function updateMiningUI() {
            const hashrate = calcHashrate();
            hashrateDisplay.textContent = hashrate.toFixed(2) + ' MH/s';
            minedDisplay.textContent = state.minedTotal.toFixed(4) + ' TON';
            miningStatus.textContent = state.miningActive ? '🟢 Работает' : '⏸ Остановлен';
            miningStatus.style.color = state.miningActive ? '#4ade80' : '#f87171';
            toggleMiningBtn.textContent = state.miningActive ? '⏹ Остановить' : '▶ Запустить';
            toggleMiningBtn.classList.toggle('active', state.miningActive);
        }

        let miningInterval = null;

        function toggleMining() {
            state.miningActive = !state.miningActive;
            if (state.miningActive) {
                const hashrate = calcHashrate();
                if (hashrate === 0) {
                    showToast('⚠️ Нет видеокарт! Купите в магазине.');
                    state.miningActive = false;
                    updateMiningUI();
                    return;
                }
                startMiningLoop();
            } else {
                if (miningInterval) {
                    clearInterval(miningInterval);
                    miningInterval = null;
                }
            }
            updateMiningUI();
            saveGame();
        }

        function startMiningLoop() {
            if (miningInterval) clearInterval(miningInterval);
            miningInterval = setInterval(() => {
                if (!state.miningActive) return;
                const hashrate = calcHashrate();
                if (hashrate === 0) {
                    state.miningActive = false;
                    updateMiningUI();
                    clearInterval(miningInterval);
                    miningInterval = null;
                    showToast('⛔ Майнинг остановлен: нет видеокарт');
                    return;
                }
                const reward = hashrate * 0.00015;
                state.minedTotal += reward;
                state.ton += reward;
                updateBalances();
                updateMiningUI();
            }, 5000);
        }

        let toastTimeout = null;
        function showToast(msg) {
            toastEl.textContent = msg;
            toastEl.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => toastEl.classList.remove('show'), 2200);
        }

        function initGame() {
            const loaded = loadGame();
            if (!loaded) {
                state.rub = 0;
                state.ton = 1.0;
                state.assets = JSON.parse(JSON.stringify(DEFAULT_ASSETS));
                state.history = [];
                state.selectedAssetId = 'ton';
                state.tradeAmount = 1.0;
                state.chartData = [];
                state.tradePoints = [];
                state.gpus = {};
                state.minedTotal = 0;
                state.miningCoin = 'ton';
                state.miningActive = false;
            }

            if (!state.assets || state.assets.length === 0) {
                state.assets = JSON.parse(JSON.stringify(DEFAULT_ASSETS));
            }
            if (state.chartData.length > 60) state.chartData = state.chartData.slice(-50);
            if (!state.gpus) state.gpus = {};

            renderMarket();
            updateBalances();
            updatePriceDisplay();
            tradeAmountSpan.textContent = state.tradeAmount.toFixed(1);
            renderHistory();
            updateChart();
            renderGPUshop();
            updateMiningUI();

            if (state.miningActive) {
                startMiningLoop();
                updateMiningUI();
            }

            if (window._saveInterval) clearInterval(window._saveInterval);
            window._saveInterval = setInterval(() => saveGame(), 30000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            initGame();

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
                    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
                });
            });

            document.getElementById('decAmount').addEventListener('click', () => {
                let v = state.tradeAmount - 0.5;
                if (v < 0.1) v = 0.1;
                state.tradeAmount = Math.round(v * 10) / 10;
                tradeAmountSpan.textContent = state.tradeAmount.toFixed(1);
            });
            document.getElementById('incAmount').addEventListener('click', () => {
                let v = state.tradeAmount + 0.5;
                if (v > 100) v = 100;
                state.tradeAmount = Math.round(v * 10) / 10;
                tradeAmountSpan.textContent = state.tradeAmount.toFixed(1);
            });
            document.getElementById('buyBtn').addEventListener('click', () => executeTrade('buy'));
            document.getElementById('sellBtn').addEventListener('click', () => executeTrade('sell'));

            toggleMiningBtn.addEventListener('click', toggleMining);
            mineCoinSelect.addEventListener('change', () => {
                state.miningCoin = mineCoinSelect.value;
                saveGame();
            });

            document.getElementById('resetBtn').addEventListener('click', () => {
                if (confirm('Сбросить прогресс?')) {
                    document.cookie = 'cryptoTraderSave=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/';
                    if (miningInterval) { clearInterval(miningInterval); miningInterval = null; }
                    state.rub = 0;
                    state.ton = 1.0;
                    state.assets = JSON.parse(JSON.stringify(DEFAULT_ASSETS));
                    state.history = [];
                    state.selectedAssetId = 'ton';
                    state.tradeAmount = 1.0;
                    state.chartData = [];
                    state.tradePoints = [];
                    state.gpus = {};
                    state.minedTotal = 0;
                    state.miningActive = false;
                    renderMarket();
                    updateBalances();
                    updatePriceDisplay();
                    tradeAmountSpan.textContent = '1.0';
                    renderHistory();
                    updateChart();
                    renderGPUshop();
                    updateMiningUI();
                    showToast('🔄 Сброшено');
                }
            });

            document.getElementById('saveBtn').addEventListener('click', saveGame);

            setInterval(() => {
                state.assets.forEach(asset => {
                    const volatility = (Math.random() * 4 - 2) / 100;
                    let newPrice = asset.price * (1 + volatility);
                    if (newPrice < 0.001) newPrice = 0.001;
                    asset.price = Math.round(newPrice * 100) / 100;
                    const change = ((asset.price - (asset._oldPrice || asset.price)) / (asset._oldPrice || asset.price)) * 100;
                    asset.change = Math.round(change * 100) / 100;
                    asset._oldPrice = asset.price;
                });
                renderMarket();
                updatePriceDisplay();
                updateChart();
                updateBalances();
            }, 5000);
        });

    })();
</script>
</body>
