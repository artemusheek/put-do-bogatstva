<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P2P Майнинг · Трейдинг</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; font-family: system-ui, sans-serif; margin: 0; padding: 0; }
        body { background: #0b0f1a; color: #eef2ff; padding: 12px; min-height: 100vh; display: flex; justify-content: center; }
        #app { max-width: 720px; width: 100%; }
        .card { background: #1a1f2e; border-radius: 24px; padding: 18px 16px; margin-bottom: 14px; box-shadow: 0 8px 20px rgba(0,0,0,0.6); border: 1px solid #2b3248; }
        .flex { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .gap-2 { gap: 8px; }
        .mt-2 { margin-top: 12px; }
        .mb-1 { margin-bottom: 6px; }
        .text-muted { color: #8892b0; font-size: 0.8rem; }
        .text-gold { color: #fbbf24; }
        .text-green { color: #4ade80; }
        .text-red { color: #f87171; }
        .text-center { text-align: center; }
        .w-full { width: 100%; }
        .btn {
            background: #2d3650; border: none; color: white; padding: 8px 16px;
            border-radius: 60px; font-weight: 600; font-size: 0.85rem;
            cursor: pointer; transition: 0.15s; border: 1px solid #3e4868;
            flex: 1 0 auto; text-align: center;
        }
        .btn-primary { background: #3b82f6; border-color: #3b82f6; }
        .btn-primary:active { background: #2563eb; }
        .btn-success { background: #22c55e; border-color: #22c55e; color: #0b0f1a; }
        .btn-success:active { background: #16a34a; }
        .btn-danger { background: #ef4444; border-color: #ef4444; }
        .btn-danger:active { background: #dc2626; }
        .btn-warning { background: #f59e0b; border-color: #f59e0b; color: #0b0f1a; }
        .btn-warning:active { background: #d97706; }
        .btn-outline { background: transparent; border: 1px solid #4b567a; }
        .btn-sm { padding: 5px 12px; font-size: 0.75rem; }
        .input {
            background: #101624; border: 1px solid #2b3248; color: white;
            padding: 8px 14px; border-radius: 60px; width: 100%; font-size: 0.9rem;
            outline: none;
        }
        .input:focus { border-color: #3b82f6; }
        .asset-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #262d42; }
        .asset-row:last-child { border-bottom: none; }
        .badge { background: #2d3650; padding: 3px 12px; border-radius: 40px; font-size: 0.7rem; }
        .balance-large { font-size: 1.7rem; font-weight: 700; letter-spacing: -0.5px; }
        .tab-bar { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
        .tab { background: #1a1f2e; padding: 6px 16px; border-radius: 40px; border: 1px solid #2b3248; cursor: pointer; transition: 0.1s; font-size: 0.85rem; }
        .tab.active { background: #3b82f6; border-color: #3b82f6; }
        .hidden { display: none; }
        .coin-icon { font-size: 1.1rem; margin-right: 6px; }
        .mining-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #1e2538; }
        .mining-row:last-child { border: none; }
        .hash-rate { color: #60a5fa; font-weight: 600; }
        @media (max-width: 480px) { .flex { gap: 6px; } .btn { padding: 6px 10px; font-size: 0.75rem; } }
    </style>
</head>
<body>
<div id="app">
    <div class="card text-center" style="padding-bottom: 10px;">
        <h2 style="font-weight: 600; letter-spacing: -0.5px;">⛏️ P2P Майнинг</h2>
        <div class="text-muted" style="font-size:0.75rem;">трейдинг · переводы · топ</div>
    </div>

    <!-- Профиль -->
    <div class="card" id="profileCard">
        <div class="flex-between">
            <div>
                <div class="text-muted">Баланс</div>
                <div class="balance-large" id="userBalance">0.00</div>
            </div>
            <div>
                <div class="text-muted">Портфель</div>
                <div id="portfolioValue" class="text-gold" style="font-size:1.3rem; font-weight:600;">0.00</div>
            </div>
            <div>
                <div class="text-muted">Хешрейт</div>
                <div id="userHashrate" class="text-green" style="font-size:1.1rem; font-weight:600;">0</div>
            </div>
        </div>
        <div class="flex gap-2 mt-2">
            <input type="text" id="playerIdInput" placeholder="ID игрока" class="input" style="flex:2;">
            <input type="number" id="transferAmount" placeholder="Сумма" class="input" style="flex:1; min-width:70px;">
            <button class="btn btn-success btn-sm" id="transferBtn">Перевести</button>
        </div>
        <div id="transferStatus" class="text-muted text-center mt-1" style="font-size:0.75rem;"></div>
    </div>

    <!-- Вкладки -->
    <div class="tab-bar">
        <div class="tab active" data-tab="market">📊 Рынок</div>
        <div class="tab" data-tab="mining">⛏️ Майнинг</div>
        <div class="tab" data-tab="portfolio">💼 Портфель</div>
        <div class="tab" data-tab="top">🏆 Топ</div>
    </div>

    <!-- Рынок -->
    <div id="marketTab" class="card">
        <div class="flex-between">
            <span class="text-muted">Активы</span>
            <span class="text-muted">Цена</span>
        </div>
        <div id="marketAssets"></div>
        <div class="flex gap-2 mt-2">
            <input type="number" id="tradeAmount" placeholder="Кол-во" class="input" style="flex:1;">
            <button class="btn btn-primary" id="buyBtn">Купить</button>
            <button class="btn btn-danger" id="sellBtn">Продать</button>
        </div>
        <div id="tradeStatus" class="text-muted text-center mt-1" style="font-size:0.75rem;"></div>
    </div>

    <!-- Майнинг -->
    <div id="miningTab" class="card hidden">
        <div class="flex-between">
            <span class="text-muted">Оборудование</span>
            <span class="text-muted">Цена / Хеш</span>
        </div>
        <div id="miningEquipment"></div>
        <div class="flex gap-2 mt-2">
            <input type="number" id="miningAmount" placeholder="Кол-во" class="input" style="flex:1;">
            <button class="btn btn-warning" id="buyMiningBtn">Купить</button>
            <button class="btn btn-danger" id="sellMiningBtn">Продать</button>
        </div>
        <div id="miningStatus" class="text-muted text-center mt-1" style="font-size:0.75rem;"></div>
        <div class="flex-between mt-2" style="border-top:1px solid #262d42; padding-top:12px;">
            <span>⛏️ Доход за час: <span id="hourlyIncome" class="text-gold">0.00</span></span>
            <button class="btn btn-primary btn-sm" id="claimMiningBtn">Забрать доход</button>
        </div>
        <div id="claimStatus" class="text-muted text-center mt-1" style="font-size:0.75rem;"></div>
    </div>

    <!-- Портфель -->
    <div id="portfolioTab" class="card hidden">
        <div class="flex-between mb-1">
            <span class="text-muted">Актив</span>
            <span class="text-muted">Кол-во · $</span>
        </div>
        <div id="portfolioList"></div>
        <div class="text-muted mt-2 text-center" id="totalPortfolioLabel">Общая стоимость: 0.00</div>
    </div>

    <!-- Топ -->
    <div id="topTab" class="card hidden">
        <div class="text-muted mb-1">🏅 Рейтинг по деньгам</div>
        <div id="topPlayersList"></div>
    </div>

    <!-- Админ-панель -->
    <div class="card" style="background:#111827; border-color:#374151;">
        <div class="flex-between">
            <span class="text-muted">⚙️ Изменить цены</span>
            <span class="badge">админ</span>
        </div>
        <div class="flex gap-2 mt-2" id="priceEditContainer"></div>
        <button class="btn btn-outline btn-sm mt-2" id="updatePricesBtn">Обновить цены</button>
        <div id="priceStatus" class="text-muted text-center mt-1" style="font-size:0.7rem;"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyADDsFRF3Dwewv8MqcbQrRMZESK3CoG5AU",
        authDomain: "put-do-bogatstva.firebaseapp.com",
        databaseURL: "https://put-do-bogatstva-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "put-do-bogatstva",
        storageBucket: "put-do-bogatstva.firebasestorage.app",
        messagingSenderId: "317422748511",
        appId: "1:317422748511:web:26395f5579d8748838ecea"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- состояние ---
    let currentUserId = null;
    let userBalance = 0;
    let userPortfolio = {};
    let userMining = { cpu: 0, ram: 0, gpu: 0 };
    let userMined = 0;
    let marketPrices = {};
    let allPlayers = {};
    let myPlayerRef = null;
    let selectedAsset = 'BTC';
    let selectedMining = 'cpu';

    const ASSETS = ['BTC', 'ETH', 'SOL', 'XRP', 'DOGE'];
    const MINING_TYPES = {
        cpu: { label: 'CPU', price: 120, hashrate: 5, icon: '🧠' },
        ram: { label: 'RAM', price: 80, hashrate: 3, icon: '💾' },
        gpu: { label: 'GPU', price: 350, hashrate: 18, icon: '🎮' }
    };

    // --- инициализация ---
    function initPlayer() {
        let uid = localStorage.getItem('p2pUserId');
        if (!uid) {
            uid = 'user_' + Math.random().toString(36).substring(2, 8) + Date.now().toString(36);
            localStorage.setItem('p2pUserId', uid);
        }
        currentUserId = uid;
        myPlayerRef = db.ref('players/' + currentUserId);
        myPlayerRef.on('value', (snap) => {
            const data = snap.val() || { balance: 1000, portfolio: {}, mining: { cpu: 0, ram: 0, gpu: 0 }, mined: 0 };
            if (!snap.exists()) {
                myPlayerRef.set({ balance: 1000, portfolio: {}, mining: { cpu: 0, ram: 0, gpu: 0 }, mined: 0 });
                userBalance = 1000; userPortfolio = {}; userMining = { cpu: 0, ram: 0, gpu: 0 }; userMined = 0;
            } else {
                userBalance = data.balance || 0;
                userPortfolio = data.portfolio || {};
                userMining = data.mining || { cpu: 0, ram: 0, gpu: 0 };
                userMined = data.mined || 0;
            }
            updateUI();
        });

        db.ref('prices').on('value', (snap) => {
            const prices = snap.val() || {};
            let needSet = false;
            ASSETS.forEach(a => { if (!(a in prices)) { prices[a] = getDefaultPrice(a); needSet = true; } });
            ['cpu', 'ram', 'gpu'].forEach(m => { if (!(m in prices)) { prices[m] = MINING_TYPES[m].price; needSet = true; } });
            if (needSet) db.ref('prices').set(prices);
            marketPrices = prices;
            renderAll();
        });

        db.ref('players').on('value', (snap) => {
            allPlayers = snap.val() || {};
            renderTop();
        });

        // Автоматический майнинг каждые 10 секунд
        setInterval(() => {
            if (currentUserId) {
                const totalHash = calcHashrate();
                if (totalHash > 0) {
                    const reward = totalHash * 0.002; // монеты в секунду * 10
                    myPlayerRef.child('mined').transaction((current) => (current || 0) + reward);
                }
            }
        }, 10000);
    }

    function getDefaultPrice(asset) {
        const map = { BTC: 45000, ETH: 3200, SOL: 140, XRP: 0.52, DOGE: 0.12 };
        return map[asset] || 10;
    }

    function calcHashrate() {
        let total = 0;
        for (const [type, qty] of Object.entries(userMining)) {
            total += qty * (MINING_TYPES[type]?.hashrate || 0);
        }
        return total;
    }

    function calcPortfolioValue() {
        let total = 0;
        for (const [asset, qty] of Object.entries(userPortfolio)) {
            total += qty * (marketPrices[asset] || 0);
        }
        return total;
    }

    function calcMiningValue() {
        let total = 0;
        for (const [type, qty] of Object.entries(userMining)) {
            total += qty * (marketPrices[type] || MINING_TYPES[type]?.price || 0);
        }
        return total;
    }

    // --- отрисовка ---
    function updateUI() {
        document.getElementById('userBalance').textContent = userBalance.toFixed(2);
        const total = calcPortfolioValue() + calcMiningValue();
        document.getElementById('portfolioValue').textContent = total.toFixed(2);
        const hr = calcHashrate();
        document.getElementById('userHashrate').textContent = hr.toFixed(0);
        const hourly = hr * 0.002 * 3600;
        document.getElementById('hourlyIncome').textContent = hourly.toFixed(2);
        renderAll();
    }

    function renderAll() {
        renderMarket();
        renderMining();
        renderPortfolio();
        renderTop();
        renderPriceEdits();
    }

    function renderMarket() {
        let html = '';
        ASSETS.forEach(asset => {
            const price = marketPrices[asset] || 0;
            const qty = userPortfolio[asset] || 0;
            html += `<div class="asset-row" data-asset="${asset}" onclick="selectAsset('${asset}')" style="cursor:pointer;">
                <span><span class="coin-icon">${getIcon(asset)}</span> ${asset}</span>
                <span>$${price.toFixed(2)} <span class="text-muted">(×${qty})</span></span>
            </div>`;
        });
        document.getElementById('marketAssets').innerHTML = html;
    }

    function renderMining() {
        let html = '';
        for (const [type, info] of Object.entries(MINING_TYPES)) {
            const price = marketPrices[type] || info.price;
            const qty = userMining[type] || 0;
            const totalHash = qty * info.hashrate;
            html += `<div class="mining-row" data-type="${type}" onclick="selectMining('${type}')" style="cursor:pointer;">
                <span>${info.icon} ${info.label}</span>
                <span>$${price.toFixed(2)} · ${qty} шт</span>
                <span class="hash-rate">${totalHash} H/s</span>
            </div>`;
        }
        document.getElementById('miningEquipment').innerHTML = html;
        document.getElementById('claimStatus').textContent = `Накопано: ${userMined.toFixed(4)} монет`;
    }

    function renderPortfolio() {
        let html = '';
        let total = 0;
        for (const [asset, qty] of Object.entries(userPortfolio)) {
            if (qty <= 0) continue;
            const price = marketPrices[asset] || 0;
            const value = qty * price;
            total += value;
            html += `<div class="asset-row">
                <span><span class="coin-icon">${getIcon(asset)}</span> ${asset}</span>
                <span>${qty.toFixed(4)} · $${value.toFixed(2)}</span>
            </div>`;
        }
        // Добавляем майнинг-оборудование в портфель
        for (const [type, qty] of Object.entries(userMining)) {
            if (qty <= 0) continue;
            const price = marketPrices[type] || MINING_TYPES[type]?.price || 0;
            const value = qty * price;
            total += value;
            const info = MINING_TYPES[type];
            html += `<div class="asset-row">
                <span>${info.icon} ${info.label}</span>
                <span>${qty} шт · $${value.toFixed(2)}</span>
            </div>`;
        }
        if (!html) html = '<div class="text-muted text-center" style="padding:12px 0;">Портфель пуст</div>';
        document.getElementById('portfolioList').innerHTML = html;
        document.getElementById('totalPortfolioLabel').textContent = `Общая стоимость: $${total.toFixed(2)}`;
    }

    function renderTop() {
        const list = [];
        for (const [id, data] of Object.entries(allPlayers)) {
            const balance = data.balance || 0;
            const portfolio = data.portfolio || {};
            const mining = data.mining || {};
            let portVal = 0;
            for (const [asset, qty] of Object.entries(portfolio)) {
                portVal += qty * (marketPrices[asset] || 0);
            }
            for (const [type, qty] of Object.entries(mining)) {
                portVal += qty * (marketPrices[type] || MINING_TYPES[type]?.price || 0);
            }
            const totalWealth = balance + portVal;
            list.push({ id, totalWealth });
        }
        list.sort((a, b) => b.totalWealth - a.totalWealth);
        let html = '';
        list.slice(0, 10).forEach((p, idx) => {
            const isMe = p.id === currentUserId;
            html += `<div class="top-player" style="${isMe ? 'background:#1e2a45; border-radius:12px; padding:6px 10px;' : ''}">
                <span>${idx+1}. ${isMe ? '⭐ ' : ''}${p.id.slice(0, 8)}</span>
                <span>$${p.totalWealth.toFixed(2)}</span>
            </div>`;
        });
        if (!html) html = '<div class="text-muted text-center">Нет игроков</div>';
        document.getElementById('topPlayersList').innerHTML = html;
    }

    function renderPriceEdits() {
        let html = '';
        [...ASSETS, 'cpu', 'ram', 'gpu'].forEach(key => {
            const price = marketPrices[key] || 0;
            const label = key;
            html += `<div style="display:flex; align-items:center; gap:4px; flex:1 0 100%;">
                <span style="min-width:35px; font-size:0.8rem;">${label}</span>
                <input type="number" step="0.01" id="price_${key}" value="${price}" class="input" style="flex:1; padding:4px 8px; font-size:0.8rem;">
            </div>`;
        });
        document.getElementById('priceEditContainer').innerHTML = html;
    }

    function getIcon(asset) {
        const map = { BTC: '₿', ETH: '⟠', SOL: '◎', XRP: '✕', DOGE: 'Ð' };
        return map[asset] || '🪙';
    }

    window.selectAsset = (asset) => { selectedAsset = asset; document.getElementById('tradeStatus').textContent = `Выбран ${asset}`; };
    window.selectMining = (type) => { selectedMining = type; document.getElementById('miningStatus').textContent = `Выбран ${MINING_TYPES[type].label}`; };

    // --- торговля ---
    function trade(type) {
        const amount = parseFloat(document.getElementById('tradeAmount').value);
        if (!amount || amount <= 0) { document.getElementById('tradeStatus').textContent = '❌ Введите количество'; return; }
        const asset = selectedAsset;
        const price = marketPrices[asset] || 0;
        if (!price) { document.getElementById('tradeStatus').textContent = '❌ Цена не найдена'; return; }
        const qty = amount;
        const totalCost = qty * price;
        let newBalance = userBalance;
        let newPortfolio = { ...userPortfolio };
        const currentQty = newPortfolio[asset] || 0;
        if (type === 'buy') {
            if (totalCost > userBalance) { document.getElementById('tradeStatus').textContent = '❌ Недостаточно средств'; return; }
            newBalance -= totalCost;
            newPortfolio[asset] = currentQty + qty;
            document.getElementById('tradeStatus').textContent = `✅ Куплено ${qty} ${asset}`;
        } else {
            if (currentQty < qty) { document.getElementById('tradeStatus').textContent = `❌ У вас только ${currentQty}`; return; }
            newBalance += totalCost;
            newPortfolio[asset] = currentQty - qty;
            if (newPortfolio[asset] <= 0.0001) delete newPortfolio[asset];
            document.getElementById('tradeStatus').textContent = `✅ Продано ${qty} ${asset}`;
        }
        myPlayerRef.update({ balance: newBalance, portfolio: newPortfolio });
        document.getElementById('tradeAmount').value = '';
    }

    // --- майнинг ---
    function tradeMining(type) {
        const amount = parseInt(document.getElementById('miningAmount').value);
        if (!amount || amount <= 0) { document.getElementById('miningStatus').textContent = '❌ Введите количество'; return; }
        const miningType = selectedMining;
        const info = MINING_TYPES[miningType];
        const price = marketPrices[miningType] || info.price;
        const totalCost = amount * price;
        let newBalance = userBalance;
        let newMining = { ...userMining };
        const currentQty = newMining[miningType] || 0;
        if (type === 'buy') {
            if (totalCost > userBalance) { document.getElementById('miningStatus').textContent = '❌ Недостаточно средств'; return; }
            newBalance -= totalCost;
            newMining[miningType] = currentQty + amount;
            document.getElementById('miningStatus').textContent = `✅ Куплено ${amount} ${info.label}`;
        } else {
            if (currentQty < amount) { document.getElementById('miningStatus').textContent = `❌ У вас только ${currentQty}`; return; }
            newBalance += totalCost;
            newMining[miningType] = currentQty - amount;
            if (newMining[miningType] <= 0) delete newMining[miningType];
            document.getElementById('miningStatus').textContent = `✅ Продано ${amount} ${info.label}`;
        }
        myPlayerRef.update({ balance: newBalance, mining: newMining });
        document.getElementById('miningAmount').value = '';
    }

    // --- забрать доход ---
    function claimMining() {
        if (userMined <= 0) { document.getElementById('claimStatus').textContent = '❌ Нет накопанных монет'; return; }
        const amount = userMined;
        myPlayerRef.update({
            balance: userBalance + amount,
            mined: 0
        });
        document.getElementById('claimStatus').textContent = `✅ Забрано ${amount.toFixed(4)} монет`;
    }

    // --- перевод ---
    function transfer() {
        const targetId = document.getElementById('playerIdInput').value.trim();
        const amount = parseFloat(document.getElementById('transferAmount').value);
        if (!targetId || !amount || amount <= 0) { document.getElementById('transferStatus').textContent = '❌ Введите ID и сумму'; return; }
        if (targetId === currentUserId) { document.getElementById('transferStatus').textContent = '❌ Себе нельзя'; return; }
        if (amount > userBalance) { document.getElementById('transferStatus').textContent = '❌ Недостаточно средств'; return; }
        db.ref('players/' + targetId).once('value').then(snap => {
            if (!snap.exists()) { document.getElementById('transferStatus').textContent = '❌ Игрок не найден'; return; }
            const targetData = snap.val();
            const newTargetBalance = (targetData.balance || 0) + amount;
            const updates = {};
            updates['players/' + currentUserId + '/balance'] = userBalance - amount;
            updates['players/' + targetId + '/balance'] = newTargetBalance;
            db.ref().update(updates).then(() => {
                document.getElementById('transferStatus').textContent = `✅ Переведено ${amount} игроку ${targetId.slice(0,6)}`;
                document.getElementById('playerIdInput').value = '';
                document.getElementById('transferAmount').value = '';
            });
        });
    }

    // --- обновить цены ---
    function updatePrices() {
        const updates = {};
        [...ASSETS, 'cpu', 'ram', 'gpu'].forEach(key => {
            const el = document.getElementById('price_' + key);
            if (el) {
                const val = parseFloat(el.value);
                if (!isNaN(val) && val > 0) updates[key] = val;
            }
        });
        if (Object.keys(updates).length === 0) { document.getElementById('priceStatus').textContent = '❌ Нет валидных цен'; return; }
        db.ref('prices').update(updates).then(() => {
            document.getElementById('priceStatus').textContent = '✅ Цены обновлены';
        });
    }

    // --- tab switching ---
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', function() {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            this.classList.add('active');
            const target = this.dataset.tab;
            ['marketTab', 'miningTab', 'portfolioTab', 'topTab'].forEach(id => {
                document.getElementById(id).classList.toggle('hidden', id !== target + 'Tab');
            });
        });
    });

    // --- события ---
    document.getElementById('buyBtn').addEventListener('click', () => trade('buy'));
    document.getElementById('sellBtn').addEventListener('click', () => trade('sell'));
    document.getElementById('buyMiningBtn').addEventListener('click', () => tradeMining('buy'));
    document.getElementById('sellMiningBtn').addEventListener('click', () => tradeMining('sell'));
    document.getElementById('claimMiningBtn').addEventListener('click', claimMining);
    document.getElementById('transferBtn').addEventListener('click', transfer);
    document.getElementById('updatePricesBtn').addEventListener('click', updatePrices);

    // --- старт ---
    initPlayer();
    // Выбираем первый актив по умолчанию
    setTimeout(() => { selectAsset('BTC'); selectMining('cpu'); }, 500);
</script>
</body>
</html>
