<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
    <title>P2P Крипто-трейдер • сохранение</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #0b0f17;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            color: #eef4fa;
        }

        .app-container {
            max-width: 860px;
            width: 100%;
            background: rgba(16, 24, 36, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 44px;
            padding: 28px 24px 32px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.9);
            transition: 0.2s;
        }

        /* балансы */
        .balance-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 22px;
        }

        .balance-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 16px;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            flex: 1 1 100px;
            min-width: 80px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .balance-item .label {
            color: #8ba0be;
            font-size: 13px;
            font-weight: 500;
        }

        .balance-item .value {
            font-weight: 700;
            font-size: 18px;
            letter-spacing: -0.2px;
            background: rgba(255, 255, 255, 0.03);
            padding: 0 10px;
            border-radius: 40px;
        }

        .value.rub { color: #7bc9ff; }
        .value.ton { color: #6ee7b7; }
        .value.total { color: #c8b6ff; }

        /* график */
        .chart-wrapper {
            background: rgba(0, 0, 0, 0.35);
            border-radius: 32px;
            padding: 14px 12px 6px;
            margin: 10px 0 18px;
            border: 1px solid #1f3142;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 6px 10px 6px;
        }

        .chart-header .pair {
            font-weight: 600;
            font-size: 17px;
            color: #d6e8ff;
        }

        .chart-header .price-badge {
            background: #1a2a3a;
            padding: 4px 18px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 17px;
        }

        #priceChart {
            width: 100%;
            height: 120px;
            display: block;
            background: transparent;
            border-radius: 20px;
        }

        /* сетка рынка */
        .market-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 8px;
            margin: 16px 0 20px;
        }

        .asset-card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 24px;
            padding: 10px 4px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            cursor: pointer;
            transition: 0.1s;
            text-align: center;
        }

        .asset-card.active {
            border: 2px solid #3b82f6;
            background: rgba(59, 130, 246, 0.12);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.12);
        }

        .asset-card:hover { background: rgba(40, 60, 85, 0.4); }
        .asset-card .icon { font-size: 22px; line-height: 1.2; }
        .asset-card .name { font-weight: 600; font-size: 13px; color: #dce8f5; }
        .asset-card .price { font-size: 12px; color: #a8c0dd; background: #111d2b; padding: 0 10px; border-radius: 40px; display: inline-block; margin-top: 2px; }
        .asset-card .change { font-size: 12px; font-weight: 500; }
        .positive { color: #4ade80; }
        .negative { color: #f87171; }

        /* торговля */
        .trade-panel {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 36px;
            padding: 16px 14px 14px;
            border: 1px solid #1f3142;
            margin-top: 4px;
        }

        .trade-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }

        .trade-top .selected-label {
            font-weight: 500;
            color: #b6cef0;
            background: #0e1a26;
            padding: 4px 18px;
            border-radius: 60px;
            font-size: 15px;
        }

        .amount-control {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #0d1823;
            padding: 2px 10px;
            border-radius: 60px;
            border: 1px solid #2b4054;
        }

        .amount-control button {
            background: none;
            border: none;
            color: #b7d6f5;
            font-size: 26px;
            font-weight: 300;
            cursor: pointer;
            width: 32px;
            transition: 0.1s;
        }
        .amount-control button:active { transform: scale(1.3); color: white; }
        .amount-control span {
            font-size: 22px;
            font-weight: 700;
            min-width: 50px;
            text-align: center;
            color: white;
        }

        .trade-buttons {
            display: flex;
            gap: 12px;
            margin: 14px 0 6px;
            flex-wrap: wrap;
        }

        .trade-btn {
            flex: 1;
            min-width: 100px;
            padding: 14px 8px;
            border: none;
            border-radius: 60px;
            font-weight: 700;
            font-size: 16px;
            letter-spacing: 0.4px;
            transition: 0.1s;
            cursor: pointer;
            box-shadow: 0 6px 0 #0b121a;
        }

        .trade-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #0b121a; }
        .trade-btn.buy { background: #0f3b2a; color: #7ddfa0; border: 1px solid #1b7a4a; box-shadow: 0 6px 0 #082116; }
        .trade-btn.sell { background: #4a1e28; color: #f7a1b0; border: 1px solid #aa3f52; box-shadow: 0 6px 0 #2d0f16; }
        .trade-btn:disabled { opacity: 0.3; transform: translateY(2px); box-shadow: 0 2px 0 #0b121a; pointer-events: none; }

        .trade-info {
            display: flex;
            justify-content: space-between;
            color: #8ba0be;
            font-size: 13px;
            padding: 0 4px;
            margin-top: 8px;
        }
        .trade-info span:last-child { color: #d6e8ff; font-weight: 500; }

        /* история */
        .history-box {
            margin-top: 18px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 28px;
            padding: 10px 14px 2px;
            border: 1px solid #1a2a3a;
            max-height: 140px;
            overflow-y: auto;
        }
        .history-box::-webkit-scrollbar { width: 4px; }
        .history-box::-webkit-scrollbar-thumb { background: #2a4055; border-radius: 12px; }

        .history-title {
            color: #6e88a3;
            font-size: 11px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid rgba(255,255,255,0.02);
            font-size: 13px;
            color: #b8cfeb;
        }
        .history-item:last-child { border-bottom: none; }
        .history-item .side-buy { color: #4ade80; }
        .history-item .side-sell { color: #f87171; }

        .reset-area {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 16px;
        }
        .reset-btn, .save-btn {
            background: transparent;
            border: 1px solid #2f4862;
            color: #8baecf;
            padding: 6px 24px;
            border-radius: 60px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.1s;
        }
        .reset-btn:active, .save-btn:active { background: #1f3142; color: white; }
        .save-btn { border-color: #2a5a6a; color: #7fc1d6; }

        .footer-note {
            text-align: center;
            color: #3f5b78;
            font-size: 11px;
            margin-top: 12px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a2a3a;
            color: #d6e8ff;
            padding: 10px 28px;
            border-radius: 60px;
            font-size: 14px;
            border: 1px solid #3b82f6;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            z-index: 999;
            opacity: 0;
            transition: opacity 0.25s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

<div class="app-container">
    <!-- балансы -->
    <div class="balance-panel">
        <div class="balance-item"><span class="label">🇷🇺 RUB</span><span class="value rub" id="rubBalance">0 ₽</span></div>
        <div class="balance-item"><span class="label">🔶 TON</span><span class="value ton" id="tonBalance">1.0000 TON</span></div>
        <div class="balance-item"><span class="label">📊 итого</span><span class="value total" id="totalValue">0 ₽</span></div>
    </div>

    <!-- график -->
    <div class="chart-wrapper">
        <div class="chart-header">
            <span class="pair" id="chartPair">TON / RUB</span>
            <span class="price-badge" id="chartPrice">240.50 ₽</span>
        </div>
        <canvas id="priceChart" width="600" height="120"></canvas>
    </div>

    <!-- рыночная сетка -->
    <div class="market-grid" id="marketGrid"></div>

    <!-- торговля -->
    <div class="trade-panel">
        <div class="trade-top">
            <span class="selected-label" id="selectedLabel">🔶 TONCOIN</span>
            <div class="amount-control">
                <button id="decAmount">−</button>
                <span id="tradeAmount">1.0</span>
                <button id="incAmount">+</button>
            </div>
        </div>

        <div class="trade-buttons">
            <button class="trade-btn buy" id="buyBtn">🟢 Купить</button>
            <button class="trade-btn sell" id="sellBtn">🔴 Продать</button>
        </div>

        <div class="trade-info">
            <span>Цена (RUB)</span>
            <span id="currentPriceDisplay">—</span>
        </div>
    </div>

    <!-- история -->
    <div class="history-box" id="historyBox">
        <div class="history-title">📋 последние сделки</div>
        <div id="historyList"><div class="history-item" style="color:#4a617c;">Начните торговать</div></div>
    </div>

    <div class="reset-area">
        <button class="reset-btn" id="resetBtn">⟳ Сброс</button>
        <button class="save-btn" id="saveBtn">💾 Сохранить</button>
    </div>
    <div class="footer-note">P2P симулятор • 10 активов • звуки • автосохранение в куки</div>
</div>

<div id="toast" class="toast"></div>

<script>
    (function() {
        // ---------- ЗВУКИ ----------
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function playBeep(type) {
            try {
                if (!audioCtx) audioCtx = new AudioCtx();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.value = type === 'buy' ? 880 : 440;
                gain.gain.value = 0.10;
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.10);
                if (type === 'buy') {
                    setTimeout(() => { osc.frequency.value = 1100; }, 40);
                }
            } catch(e) { /* игнорим */ }
        }

        // ---------- COOKIE ----------
        function setCookie(name, value, days = 7) {
            const d = new Date();
            d.setTime(d.getTime() + days * 24 * 60 * 60 * 1000);
            document.cookie = name + "=" + JSON.stringify(value) + "; expires=" + d.toUTCString() + "; path=/";
        }

        function getCookie(name) {
            const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
            if (match) {
                try { return JSON.parse(decodeURIComponent(match[2])); } catch(e) { return null; }
            }
            return null;
        }

        // ---------- СОСТОЯНИЕ ----------
        const DEFAULT_ASSETS = [
            { id: 'ton', name: 'TONCOIN', symbol: '🔶', price: 240.50, change: 0 },
            { id: 'btc', name: 'BTC', symbol: '₿', price: 4520000, change: 0 },
            { id: 'eth', name: 'ETH', symbol: '⟠', price: 324000, change: 0 },
            { id: 'usdt', name: 'USDT', symbol: '💵', price: 92.30, change: 0 },
            { id: 'sol', name: 'SOL', symbol: '◎', price: 182.40, change: 0 },
            { id: 'ada', name: 'ADA', symbol: '₳', price: 0.68, change: 0 },
            { id: 'xrp', name: 'XRP', symbol: '✕', price: 0.62, change: 0 },
            { id: 'dot', name: 'DOT', symbol: '●', price: 8.75, change: 0 },
            { id: 'avax', name: 'AVAX', symbol: '▲', price: 42.10, change: 0 },
            { id: 'matic', name: 'MATIC', symbol: '◆', price: 0.83, change: 0 },
        ];

        let state = {
            rub: 0,
            ton: 1.0,
            assets: JSON.parse(JSON.stringify(DEFAULT_ASSETS)),
            history: [],
            selectedAssetId: 'ton',
            tradeAmount: 1.0,
            chartData: [],
        };

        // DOM
        const rubEl = document.getElementById('rubBalance');
        const tonEl = document.getElementById('tonBalance');
        const totalValueEl = document.getElementById('totalValue');
        const marketGrid = document.getElementById('marketGrid');
        const selectedLabel = document.getElementById('selectedLabel');
        const currentPriceDisplay = document.getElementById('currentPriceDisplay');
        const tradeAmountSpan = document.getElementById('tradeAmount');
        const historyList = document.getElementById('historyList');
        const chartCanvas = document.getElementById('priceChart');
        const ctx = chartCanvas.getContext('2d');
        const chartPair = document.getElementById('chartPair');
        const chartPrice = document.getElementById('chartPrice');
        const toastEl = document.getElementById('toast');

        // ---------- ВСПОМОГАТЕЛЬНЫЕ ----------
        function formatRub(v) {
            if (v >= 1000) return v.toLocaleString('ru-RU', { minimumFractionDigits: 0, maximumFractionDigits: 0 }) + ' ₽';
            return v.toFixed(2) + ' ₽';
        }
        function formatTon(v) { return v.toFixed(4) + ' TON'; }

        function getAsset(id) { return state.assets.find(a => a.id === id); }
        function getSelectedPrice() { const a = getAsset(state.selectedAssetId); return a ? a.price : 0; }
        function getSelectedAsset() { return getAsset(state.selectedAssetId); }

        // ---------- СОХРАНЕНИЕ / ЗАГРУЗКА ----------
        function saveGame() {
            const data = {
                rub: state.rub,
                ton: state.ton,
                assets: state.assets,
                history: state.history.slice(0, 30),
                selectedAssetId: state.selectedAssetId,
                tradeAmount: state.tradeAmount,
                chartData: state.chartData.slice(-40),
            };
            setCookie('cryptoTraderSave', data, 14);
            showToast('✅ Игра сохранена в куки');
        }

        function loadGame() {
            const saved = getCookie('cryptoTraderSave');
            if (saved) {
                try {
                    state.rub = saved.rub ?? 0;
                    state.ton = saved.ton ?? 1.0;
                    // восстанавливаем активы (с заменой цен)
                    if (saved.assets && Array.isArray(saved.assets)) {
                        // дополняем недостающие
                        const savedMap = {};
                        saved.assets.forEach(a => { savedMap[a.id] = a; });
                        state.assets = DEFAULT_ASSETS.map(def => {
                            const s = savedMap[def.id];
                            return s ? { ...def, ...s } : { ...def };
                        });
                    }
                    state.history = saved.history || [];
                    state.selectedAssetId = saved.selectedAssetId || 'ton';
                    state.tradeAmount = saved.tradeAmount ?? 1.0;
                    state.chartData = saved.chartData || [];
                    // гарантируем, что chartData не слишком большая
                    if (state.chartData.length > 60) state.chartData = state.chartData.slice(-40);
                    return true;
                } catch(e) { console.warn('Ошибка загрузки', e); }
            }
            return false;
        }

        // ---------- ОБНОВЛЕНИЕ UI ----------
        function updateBalances() {
            rubEl.textContent = formatRub(state.rub);
            tonEl.textContent = formatTon(state.ton);
            const tonPrice = getAsset('ton')?.price || 240.5;
            const total = state.rub + state.ton * tonPrice;
            totalValueEl.textContent = formatRub(total);
        }

        function updatePriceDisplay() {
            const asset = getSelectedAsset();
            if (asset) {
                currentPriceDisplay.textContent = formatRub(asset.price);
                selectedLabel.textContent = asset.symbol + ' ' + asset.name;
                chartPair.textContent = asset.symbol + ' / RUB';
                chartPrice.textContent = formatRub(asset.price);
            }
        }

        // ---------- ГРАФИК ----------
        function updateChart() {
            const asset = getSelectedAsset();
            if (!asset) return;
            state.chartData.push(asset.price);
            if (state.chartData.length > 50) state.chartData.shift();

            const w = chartCanvas.width;
            const h = chartCanvas.height;
            ctx.clearRect(0, 0, w, h);
            if (state.chartData.length < 2) {
                ctx.fillStyle = '#4a617c';
                ctx.font = '13px Inter';
                ctx.fillText('⏳ накопление данных...', 20, 55);
                return;
            }

            const data = state.chartData;
            const min = Math.min(...data) * 0.995;
            const max = Math.max(...data) * 1.005;
            const range = max - min || 1;
            const pad = 6;
            const graphW = w - pad * 2;
            const graphH = h - pad * 2;

            ctx.beginPath();
            ctx.strokeStyle = '#3b82f6';
            ctx.lineWidth = 2.5;
            ctx.shadowColor = 'rgba(59,130,246,0.25)';
            ctx.shadowBlur = 6;

            for (let i = 0; i < data.length; i++) {
                const x = pad + (i / (data.length - 1)) * graphW;
                const y = pad + graphH - ((data[i] - min) / range) * graphH;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
            ctx.shadowBlur = 0;

            const lastX = pad + ((data.length - 1) / (data.length - 1)) * graphW;
            const lastY = pad + graphH - ((data[data.length - 1] - min) / range) * graphH;
            ctx.lineTo(lastX, pad + graphH);
            ctx.lineTo(pad, pad + graphH);
            ctx.closePath();
            const grad = ctx.createLinearGradient(0, pad, 0, pad + graphH);
            grad.addColorStop(0, 'rgba(59,130,246,0.2)');
            grad.addColorStop(1, 'rgba(59,130,246,0.01)');
            ctx.fillStyle = grad;
            ctx.fill();
        }

        // ---------- РЕНДЕР РЫНКА ----------
        function renderMarket() {
            marketGrid.innerHTML = '';
            state.assets.forEach(asset => {
                const card = document.createElement('div');
                card.className = 'asset-card' + (asset.id === state.selectedAssetId ? ' active' : '');
                card.dataset.assetId = asset.id;
                const ch = asset.change;
                const chClass = ch >= 0 ? 'positive' : 'negative';
                const chSign = ch >= 0 ? '▲' : '▼';
                card.innerHTML = `
                    <div class="icon">${asset.symbol}</div>
                    <div class="name">${asset.name}</div>
                    <div class="price">${formatRub(asset.price)}</div>
                    <div class="change ${chClass}">${chSign} ${Math.abs(ch).toFixed(2)}%</div>
                `;
                card.addEventListener('click', () => {
                    state.selectedAssetId = asset.id;
                    renderMarket();
                    updatePriceDisplay();
                    updateChart();
                });
                marketGrid.appendChild(card);
            });
        }

        // ---------- ИСТОРИЯ ----------
        function addHistory(type, symbol, amount, price) {
            state.history.unshift({
                type, symbol, amount: Math.round(amount * 1000) / 1000,
                price: Math.round(price * 100) / 100,
                time: new Date().toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit' })
            });
            if (state.history.length > 30) state.history.pop();
            renderHistory();
        }

        function renderHistory() {
            if (state.history.length === 0) {
                historyList.innerHTML = `<div class="history-item" style="color:#4a617c;">Сделок пока нет</div>`;
                return;
            }
            historyList.innerHTML = '';
            state.history.forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                const side = item.type === 'buy' ? 'side-buy' : 'side-sell';
                const txt = item.type === 'buy' ? 'Покупка' : 'Продажа';
                div.innerHTML = `<span><span class="${side}">${txt}</span> ${item.symbol} ${item.amount.toFixed(3)}</span><span>${formatRub(item.price)} • ${item.time}</span>`;
                historyList.appendChild(div);
            });
        }

        // ---------- ТОРГОВЛЯ ----------
        function executeTrade(type) {
            const amount = state.tradeAmount;
            if (amount <= 0) return;
            const asset = getSelectedAsset();
            if (!asset) return;
            const price = asset.price;
            const totalCost = amount * price;

            if (type === 'buy') {
                if (state.rub < totalCost) { showToast('❌ Недостаточно RUB!'); return; }
                state.rub -= totalCost;
                state.ton += amount;
                playBeep('buy');
                addHistory('buy', asset.symbol, amount, price);
            } else {
                if (state.ton < amount) { showToast('❌ Недостаточно TONCOIN!'); return; }
                state.ton -= amount;
                state.rub += totalCost;
                playBeep('sell');
                addHistory('sell', asset.symbol, amount, price);
            }
            updateBalances();
            renderMarket();
            updatePriceDisplay();
            updateChart();
            // автосохранение после каждой сделки
            saveGame();
        }

        // ---------- TOAST ----------
        let toastTimeout = null;
        function showToast(msg) {
            toastEl.textContent = msg;
            toastEl.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => toastEl.classList.remove('show'), 2500);
        }

        // ---------- ИНИЦИАЛИЗАЦИЯ ----------
        function initGame() {
            // Пытаемся загрузить сохранение
            const loaded = loadGame();

            // Если не загрузилось — ставим дефолт
            if (!loaded) {
                state.rub = 0;
                state.ton = 1.0;
                state.assets = JSON.parse(JSON.stringify(DEFAULT_ASSETS));
                state.history = [];
                state.selectedAssetId = 'ton';
                state.tradeAmount = 1.0;
                state.chartData = [];
            }

            // Приводим к порядку
            if (!state.assets || state.assets.length === 0) {
                state.assets = JSON.parse(JSON.stringify(DEFAULT_ASSETS));
            }
            if (state.chartData.length > 60) state.chartData = state.chartData.slice(-40);

            renderMarket();
            updateBalances();
            updatePriceDisplay();
            tradeAmountSpan.textContent = state.tradeAmount.toFixed(1);
            renderHistory();
            updateChart();

            // автосохранение раз в 30 секунд
            if (window._saveInterval) clearInterval(window._saveInterval);
            window._saveInterval = setInterval(() => saveGame(), 30000);
        }

        // ---------- ПОДПИСКИ ----------
        document.addEventListener('DOMContentLoaded', () => {
            initGame();

            document.getElementById('decAmount').addEventListener('click', () => {
                let v = state.tradeAmount - 0.5;
                if (v < 0.1) v = 0.1;
                state.tradeAmount = Math.round(v * 10) / 10;
                tradeAmountSpan.textContent = state.tradeAmount.toFixed(1);
            });
            document.getElementById('incAmount').addEventListener('click', () => {
                let v = state.tradeAmount + 0.5;
                if (v > 100) v = 100;
                state.tradeAmount = Math.round(v * 10) / 10;
                tradeAmountSpan.textContent = state.tradeAmount.toFixed(1);
            });

            document.getElementById('buyBtn').addEventListener('click', () => executeTrade('buy'));
            document.getElementById('sellBtn').addEventListener('click', () => executeTrade('sell'));

            document.getElementById('resetBtn').addEventListener('click', () => {
                if (confirm('Сбросить прогресс? Все данные будут удалены.')) {
                    // удаляем куки
                    document.cookie = 'cryptoTraderSave=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/';
                    state.rub = 0;
                    state.ton = 1.0;
                    state.assets = JSON.parse(JSON.stringify(DEFAULT_ASSETS));
                    state.history = [];
                    state.selectedAssetId = 'ton';
                    state.tradeAmount = 1.0;
                    state.chartData = [];
                    renderMarket();
                    updateBalances();
                    updatePriceDisplay();
                    tradeAmountSpan.textContent = '1.0';
                    renderHistory();
                    updateChart();
                    showToast('🔄 Прогресс сброшен');
                }
            });

            document.getElementById('saveBtn').addEventListener('click', () => {
                saveGame();
            });

            // Колебание цен раз в 5 секунд
            setInterval(() => {
                state.assets.forEach(asset => {
                    const volatility = (Math.random() * 4 - 2) / 100;
                    let newPrice = asset.price * (1 + volatility);
                    if (newPrice < 0.001) newPrice = 0.001;
                    asset.price = Math.round(newPrice * 100) / 100;
                    // change (приблизительно)
                    const change = ((asset.price - (asset._oldPrice || asset.price)) / (asset._oldPrice || asset.price)) * 100;
                    asset.change = Math.round(change * 100) / 100;
                    asset._oldPrice = asset.price;
                });
                renderMarket();
                updatePriceDisplay();
                updateChart();
                updateBalances();
            }, 5000);
        });

    })();
</script>
</body>
</html>
